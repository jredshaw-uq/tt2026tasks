    fit.style.transform = 'none';
    var availW = el.clientWidth;
    var availH = el.clientHeight;
    if (availW <= 0 || availH <= 0) return;
    var natW = fit.scrollWidth;
    var natH = fit.scrollHeight;
    if (natW <= 0 || natH <= 0) return;
    var s = Math.min(availW / natW, availH / natH, 1);
    if (s < 1) s *= 0.985;            /* small margin for sub-pixel rounding */
    if (s >= 0.999) {
      fit.style.transform = 'none';
    } else {
      fit.style.transform = 'scale(' + s.toFixed(4) + ')';
    }
  }

  function updateActiveAndFit(){
    /* Choose the single primary screen among those the experiment intends
       to show, by priority. */
    var primary = null;
    for (var i = 0; i < PRIORITY.length; i++){
      var pe = byId(PRIORITY[i]);
      if (pe && intendedVisible(pe)) { primary = PRIORITY[i]; break; }
    }
    ALL_IDS.forEach(function(id){
      var el = byId(id);
      if (!el) return;
      if (id === primary){
        el.classList.add('nf-active');
        el.classList.remove('nf-collapsed');
      } else if (intendedVisible(el)){
        /* visible but not primary => an empty leftover panel: hide it so it
           doesn't take a slice of the column above the task */
        el.classList.remove('nf-active');
        el.classList.add('nf-collapsed');
      } else {
        el.classList.remove('nf-active');
        el.classList.remove('nf-collapsed');
      }
    });
    /* Only instruction/task screens are scaled; #endArea may scroll instead. */
    if (primary && FIT_IDS.indexOf(primary) !== -1){
      fitStage(byId(primary));
    }
  }

  var rafPending = false;
  function scheduleFit(){
    if (rafPending) return;
    rafPending = true;
    (window.requestAnimationFrame || function(f){ return setTimeout(f, 16); })(function(){
      rafPending = false;
      updateActiveAndFit();
    });
  }

  function init(){
    setup();
    updateActiveAndFit();

    window.addEventListener('resize', scheduleFit, { passive: true });
    window.addEventListener('orientationchange', scheduleFit, { passive: true });
    window.addEventListener('load', scheduleFit);

    if (document.fonts && document.fonts.ready && document.fonts.ready.then) {
      document.fonts.ready.then(scheduleFit).catch(function(){});
    }

    if (typeof ResizeObserver !== 'undefined') {
      var ro = new ResizeObserver(scheduleFit);
      ALL_IDS.forEach(function(id){
        var el = byId(id);
        if (el) {
          ro.observe(el);
          if (el.__nfFit) ro.observe(el.__nfFit);
        }
      });
    }

    if (typeof MutationObserver !== 'undefined') {
      var mo = new MutationObserver(scheduleFit);
      ALL_IDS.forEach(function(id){
        var el = byId(id);
        if (!el) return;
        /* screen show/hide (inline style or class changes) */
        mo.observe(el, { attributes: true, attributeFilter: ['style', 'class'] });
        /* instruction innerHTML swaps and slide show/hide */
        if (el.__nfFit) {
          mo.observe(el.__nfFit, {
            childList: true, subtree: true,
            attributes: true, attributeFilter: ['style', 'class']
          });
        }
      });
    }

    /* Re-fit once any in-content image finishes loading. */
    var imgs = document.querySelectorAll('.nf-fit img');
    Array.prototype.forEach.call(imgs, function(img){
      if (!img.complete) img.addEventListener('load', scheduleFit, { once: true });
    });

    /* Catch-all retries for late async layout. */
    [0, 60, 160, 320, 650, 1200, 2000].forEach(function(t){ setTimeout(scheduleFit, t); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
<\/script>

</body>

</script>

  <script>

(function(){
  "use strict";
  var frame = document.getElementById('task-frame');
  var overlay = document.getElementById('duo-overlay');
  function showOverlay(inner){ overlay.innerHTML = '<div style="text-align:center;max-width:820px;padding:24px;">'+inner+'</div>'; overlay.style.display='flex'; }
  function hideOverlay(){ overlay.style.display='none'; }
  function getParam(n){ try { return new URLSearchParams(location.search).get(n); } catch(e){ return null; } }
  var SUB = getParam('sub') || '';
  var IS_LOCAL = (location.protocol === 'file:') || /^(localhost|127\.0\.0\.1|::1|\[::1\])$/.test(location.hostname || '');
  var TEST_MODE = false;
  if (!SUB && IS_LOCAL){ SUB = '99999'; TEST_MODE = true; }
  window.__testMode = TEST_MODE;
  var SEQUENCE = [ {role:'maintask', srcId:'task-maintask'}, {role:'searchtermination', srcId:'task-st'} ];
  var results = []; var idx = 0; var sharedMouseHand = null; var sharedDevice = null; var done = false; var started = false;
  function taskHtml(srcId){ var raw = document.getElementById(srcId).textContent; return raw.replace(/<\\\/script>/g, '<'+'/script>'); }
  function loadTask(step){
    started = true;
    var ctx = { sub: SUB, role: step.role };
    if (sharedMouseHand) ctx.mouseHand = sharedMouseHand;
    if (sharedDevice) ctx.device = sharedDevice;
    // Fullscreen is owned by the orchestrator (top page), so each task skips its own prompt.
    var inject = '<'+'script>window.__DUO=' + JSON.stringify(ctx) + ';window.__fullscreenPromptDone=true;<'+'/script>';
    showOverlay(idx===0 ? 'Loading&hellip;' : 'Loading the next part&hellip;');
    frame.srcdoc = inject + taskHtml(step.srcId);
  }
  function proceedToNextTask(step){
    /* v1-46: keep fullscreen across the task handoff. If the TOP page is still in
       fullscreen it survives the iframe reload, so continue straight on. Otherwise
       fullscreen is held by the iframe (which is discarded when the iframe reloads)
       or has already been lost: drop any iframe fullscreen so the gate below is
       visible, then require a fresh user-gesture click to re-enter (top-page)
       fullscreen before the next task loads. Either way the next task starts in
       fullscreen, so its own monitor arms and enforces it. */
    if (document.fullscreenElement === document.documentElement){ loadTask(step); return; }
    try { if (document.fullscreenElement && document.exitFullscreen){ document.exitFullscreen(); } } catch(e){}
    showOverlay('<div style="font-size:24px;line-height:1.5;max-width:680px;margin-bottom:32px;">You have completed the first part.</div>'
      + '<button id="fsContinueBtn" type="button" style="height:76px;padding:0 40px;background:#000;color:#fff;border:3px solid #000;border-radius:10px;font-size:26px;font-weight:800;letter-spacing:1px;cursor:pointer;">Continue in full screen</button>');
    var b = document.getElementById('fsContinueBtn');
    if (b) b.addEventListener('click', function(){
      try { var el=document.documentElement; var req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen; if(req){ var p=req.call(el); if(p&&p.catch) p.catch(function(){}); } } catch(e){}
      loadTask(step);
    }, { once:true });
  }
  frame.addEventListener('load', function(){ if (started && !done) setTimeout(hideOverlay, 150); });
  window.addEventListener('message', function(ev){
    var d = ev.data;
    if (!d || d.__duo !== true || d.type !== 'task-done') return;
    if (done || idx >= SEQUENCE.length) return;
    if (d.role !== SEQUENCE[idx].role) return;
    results.push({ role:d.role, csv:d.csv, mouseHand:d.mouseHand, device:d.device });
    if (d.mouseHand && !sharedMouseHand) sharedMouseHand = d.mouseHand;
    if (d.device && !sharedDevice) sharedDevice = d.device;
    idx++;
    if (idx < SEQUENCE.length) proceedToNextTask(SEQUENCE[idx]); else finishSession();
  });
  function combineCsv(){
    var header = null, rows = [];
    for (var i=0;i<results.length;i++){
      var lines = results[i].csv.split(/\r?\n/);
      if (header === null) header = lines[0];
      else if (lines[0] !== header) throw new Error('CSV header mismatch between task '+i+' and task 0');
      for (var j=1;j<lines.length;j++){ if (lines[j] !== '') rows.push(lines[j]); }
    }
    return [header].concat(rows).join('\r\n');
  }
  /* ---- v1-20 launch plumbing: DataPipe upload + Prolific completion ---- */
  var ORCH_VERSION = 'v1-50';
  var DATAPIPE_EXPERIMENT_ID = '2VKh1IeoOyo4';
  var PROLIFIC_COMPLETION_URL = 'https://app.prolific.com/submissions/complete?cc=PROLIFIC_CODE_PLACEHOLDER';
  var STREAM_TAG = 'mt_st';

  function makeFilename(){
    var t = new Date();
    function p2(n){ return (n < 10 ? '0' : '') + n; }
    var stamp = t.getFullYear() + p2(t.getMonth()+1) + p2(t.getDate()) + '-' + p2(t.getHours()) + p2(t.getMinutes()) + p2(t.getSeconds());
    return 'subject_' + String(SUB||'unknown') + '_' + STREAM_TAG + '_' + stamp + '.csv';
  }

  function wireDownload(btnId, combined, filename){
    var b = document.getElementById(btnId);
    if (b) b.addEventListener('click', function(){
      var blob = new Blob([combined], {type:'text/csv;charset=utf-8;'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href=url; a.download=filename;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    });
  }

  /* POST the CSV to DataPipe. 3 attempts (immediate, +2s, +5s), 20s timeout
     per attempt. Success = any 2xx response. */
  function uploadToDataPipe(filename, data, onDone){
    var DELAYS = [0, 2000, 5000];
    function attempt(n){
      if (typeof fetch !== 'function'){ onDone(false); return; }
      var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      var timer = ctrl ? setTimeout(function(){ try { ctrl.abort(); } catch(e){} }, 20000) : null;
      var opts = {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': '*/*' },
        body: JSON.stringify({ experimentID: DATAPIPE_EXPERIMENT_ID, filename: filename, data: data })
      };
      if (ctrl) opts.signal = ctrl.signal;
      fetch('https://pipe.jspsych.org/api/data', opts).then(function(resp){
        if (timer) clearTimeout(timer);
        if (resp && resp.ok){ onDone(true); }
        else if (n + 1 < DELAYS.length){ setTimeout(function(){ attempt(n+1); }, DELAYS[n+1]); }
        else { onDone(false); }
      }).catch(function(){
        if (timer) clearTimeout(timer);
        if (n + 1 < DELAYS.length){ setTimeout(function(){ attempt(n+1); }, DELAYS[n+1]); }
        else { onDone(false); }
      });
    }
    attempt(0);
  }

  function finishSession(){
    done = true;
    var combined;
    try { combined = combineCsv(); } catch(e){ showOverlay('Error combining data: '+e.message); window.__comboUnloadActive = false; return; }
    window.__combinedCsv = combined;
    try { if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen(); } catch(e){}
    frame.style.display = 'none';
    var filename = makeFilename();
    window.__uploadedFilename = filename;
    /* Keep the unload guard ACTIVE during upload so closing the tab now warns. */
    showOverlay('<div style="font-size:24px;">Saving your data&hellip;<br><span style="font-size:16px;color:#666;">Please keep this window open.</span><br><span style="font-size:16px;color:#666;">This may take a minute or two. Please don&rsquo;t close your browser.</span></div>');
    uploadToDataPipe(filename, combined, function(okUpload){
      window.__uploadOk = okUpload;
      window.__comboUnloadActive = false;
      if (okUpload){
        if (TEST_MODE){
          showOverlay('<div style="font-size:24px;margin-bottom:20px;">Data saved. The experiment is complete. Thank you.</div>' +
            '<div style="font-size:15px;color:#666;margin-bottom:16px;">TEST MODE: a real session would now redirect to Prolific.</div>' +
            '<button id="dlBtn" type="button" style="padding:12px 22px;font-size:18px;cursor:pointer;">Download a copy</button>');
          wireDownload('dlBtn', combined, filename);
        } else {
          showOverlay('<div style="font-size:24px;margin-bottom:20px;">Your data has been saved. Thank you.</div>' +
            '<div style="font-size:17px;">Returning you to Prolific&hellip; If nothing happens, <a href="' + PROLIFIC_COMPLETION_URL + '">click here</a>.</div>');
          setTimeout(function(){
            window.__redirectTo = PROLIFIC_COMPLETION_URL;
            try { window.location.href = PROLIFIC_COMPLETION_URL; } catch(e){}
          }, 2500);
        }
      } else {
        showOverlay('<div style="font-size:22px;margin-bottom:14px;">We could not upload your data automatically.</div>' +
          '<div style="font-size:16px;color:#444;max-width:640px;margin:0 auto 18px;">Please click the button below to download your data file, then return to Prolific to complete the study, and contact the research team so your submission can be approved.</div>' +
          '<button id="dlBtn" type="button" style="padding:12px 22px;font-size:18px;cursor:pointer;margin-right:14px;">Download CSV</button>' +
          '<a href="' + PROLIFIC_COMPLETION_URL + '" style="font-size:17px;">Return to Prolific</a>');
        wireDownload('dlBtn', combined, filename);
      }
    });
  }
  function enterFullscreenThenStart(){
    try { var el=document.documentElement; var req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen; if(req){ var p=req.call(el); if(p&&p.catch) p.catch(function(){}); } } catch(e){}
    loadTask(SEQUENCE[0]);
  }
  window.__comboUnloadActive = true;
  window.addEventListener('beforeunload', function(e){ if (!window.__comboUnloadActive) return; e.preventDefault(); e.returnValue=''; });
  if (!SUB){ showOverlay('Missing participant ID. Please return to Prolific and re-enter via the study link.'); }
  else {
    if (TEST_MODE){
      var banner = document.createElement('div');
      banner.textContent = 'TEST MODE \u2014 no Prolific ID (sub=' + SUB + ')';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2147483646;background:#b00020;color:#fff;font:600 13px system-ui,sans-serif;text-align:center;padding:4px 8px;pointer-events:none;';
      document.body.appendChild(banner);
    }
    showOverlay('<button id="fsBtn" type="button" style="height:76px;padding:0 40px;background:#000;color:#fff;border:3px solid #000;border-radius:10px;font-size:26px;font-weight:800;letter-spacing:1px;cursor:pointer;">Click to enter full screen and begin</button>');
    var fsb = document.getElementById('fsBtn');
    if (fsb) fsb.addEventListener('click', enterFullscreenThenStart, { once:true });
  }
})();

</script>
