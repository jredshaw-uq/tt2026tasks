<script>
/* v11 responsive rebuild.

/* Changes in this version (only the requested fixes):
   - The run-level "crossings" value is now computed per run as the number of times
     the majority color (blue vs red) changes from sheet to sheet, excluding the
     transition from Sheet1 -> Sheet2 and excluding any transitions where either
     the previous or current sheet is a tie (totalBlue === totalRed).
     This run-level crossings value is stored on run.crossings and exported as run-level crossings.
   - The per-sheet "crossing_moment" is 1 when the majority color changes at that sheet
     compared to the previous sheet (excluding Sheet1->Sheet2 and excluding ties), otherwise 0.
   - No other behavior or exported variables were changed.
*/

window.addEventListener('load', () => {
  window.__screenRefreshRate = null;
  (function(){
    try {
      var __times = [], __n = 0;
      function __step(t){
        __times.push(t);
        if (++__n < 40){ requestAnimationFrame(__step); return; }
        var d = [];
        for (var i = 1; i < __times.length; i++){
          var dt = __times[i] - __times[i-1];
          if (dt > 1 && dt < 100) d.push(dt);
        }
        if (d.length >= 10){
          d.sort(function(a,b){ return a - b; });
          var med = d[Math.floor(d.length/2)];
          window.__screenRefreshRate = Math.round((1000/med)*10)/10;
        }
      }
      requestAnimationFrame(__step);
    } catch(e){}
  })();

  try { main(); }
  catch (err) {
    console.error('Initialization error:', err);
    alert('Initialization error: ' + (err && err.message ? err.message : String(err)));
    const dbg = document.getElementById('debugLog');
    if (dbg) dbg.textContent = 'Initialization error: ' + (err && err.message ? err.message : String(err));
  }
});

function __constrainedGoalOrder(OPTIONS){
  // Constrained randomisation of the 4 goal-check options.
  //   #1 single_open, #2 single_full, #3 more_open, #4 more_full
  // Rules: {1,2} stay adjacent and {3,4} stay adjacent (one pair in a/b, the other in c/d);
  //   a single "ignore-first" bit sets within-pair order for BOTH pairs (so 1<2 iff 3<4).
  function byId(id){ for (var i=0;i<OPTIONS.length;i++){ if (OPTIONS[i].id===id) return OPTIONS[i]; } return null; }
  var o1=byId('single_open'), o2=byId('single_full'), o3=byId('more_open'), o4=byId('more_full');
  if(!o1||!o2||!o3||!o4){ var a=OPTIONS.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  var ignoreFirst = (Math.random() < 0.5);   // #1 before #2 (and #3 before #4) when true
  var selPairTop  = (Math.random() < 0.5);   // {1,2} occupy a/b when true, else c/d
  var pair12 = ignoreFirst ? [o1,o2] : [o2,o1];
  var pair34 = ignoreFirst ? [o3,o4] : [o4,o3];
  return selPairTop ? pair12.concat(pair34) : pair34.concat(pair12);
}

function __goalOrderOnce(OPTIONS){
  // Compute the constrained option order ONCE per participant, then reuse it for every
  // goal check (pre-test original + repeats, AND post-test) so the layout is identical.
  if(!window.__goalOrderIds){
    var ord = __constrainedGoalOrder(OPTIONS);
    window.__goalOrderIds = ord.map(function(o){ return o.id; });
  }
  var byId = {}; for(var i=0;i<OPTIONS.length;i++){ byId[OPTIONS[i].id] = OPTIONS[i]; }
  var out = []; for(var k=0;k<window.__goalOrderIds.length;k++){ var o=byId[window.__goalOrderIds[k]]; if(o) out.push(o); }
  return out;
}

function __goalLayoutCode(order){
  // canonical display order as option numbers, e.g. "1234","2143","3412","4321"
  var n={single_open:'1',single_full:'2',more_open:'3',more_full:'4'};
  var s=''; for(var i=0;i<order.length;i++){ s += (n[order[i].id] || '?'); }
  return s;
}

function main(){
  function mulberry32(seed) {
    let t = seed >>> 0;

  // walk gauss x numGroups -> full-grid shuffle (total-1) -> per-revealed-box
  // assignment (in reveal order) -> 1 final draw (the syncRoll below). This
  // guarantees a searched seed reproduces here exactly, for canonical AND advanced settings.
  function generate_runs(seed, runsCount) {
    const rnd = mulberry32(seed);
    const cfg = STIM_CONFIG, SCH = SCHEDULE, numGroups = SCH.numGroups;
    const runs = [];
    for (let runIdx = 0; runIdx < runsCount; runIdx++) {
      // bimodal start-p: choose the mode. Probabilistic consumes one draw; determined consumes none.
      let pm = cfg.pMean, ps = cfg.pStd;
      if (cfg.genAdvanced && cfg.bmEnable) {
        let mode;
        if (cfg.bmAssign === 'probabilistic') { mode = (rnd() < cfg.bmProb) ? 1 : 2; }
        else { mode = (runIdx < cfg.bmN1) ? 1 : 2; }
        if (mode === 1) { pm = cfg.bmMean1; ps = cfg.bmSd1; } else { pm = cfg.bmMean2; ps = cfg.bmSd2; }
      }
      const start_p = truncated_gauss_val(rnd, pm, ps, cfg.pLo, cfg.pHi);
      const walk_sd = cfg.walkSdLo + rnd() * (cfg.walkSdHi - cfg.walkSdLo);
      const p_vals = [start_p];
      let p = start_p, step = 0;
      const wmode = cfg.genAdvanced ? cfg.walkMode : 'pure';
      for (let s = 1; s <= numGroups; s++) {

      const groups = []; { let off = 0; for (let g = 0; g < numGroups; g++) { groups.push(cells.slice(off, off + SCH.groupSizes[g])); off += SCH.groupSizes[g]; } }

      // assignment and sheetTotals
      const assignment={};
      const cumulative_blue_fracs=[];
      const sheetTotals = []; // index 0..SHEETS-1 for sheets 1..9
      for (let sheetIdx=0; sheetIdx<SHEETS; sheetIdx++){

          const redCount = introduced.length - blueCount;

          sheetTotals.push({ totalBlue: blueCount, totalRed: redCount });

      // compute run-level crossings based on majority changes across sheets
      // Rule: count transitions where majority color changes between consecutive sheets,
      // exclude the transition from Sheet1->Sheet2, and exclude transitions where either prev or cur is a tie.
      let run_crossings = 0;
      // zero-based sheet indices: 0..8 correspond to sheets 1..9
      // we consider transitions prevIndex -> curIndex where curIndex >= 2 (i.e., sheet 3..9 compared to previous)
      for (let curIdx = 2; curIdx < SHEETS; curIdx++) {
        const prevIdx = curIdx - 1;
        const prev = sheetTotals[prevIdx];
        const cur = sheetTotals[curIdx];
        if (!prev || !cur) continue;
        // exclude ties
        if (prev.totalBlue === prev.totalRed) continue;
        if (cur.totalBlue === cur.totalRed) continue;
        const prevMajor = (prev.totalBlue > prev.totalRed) ? 'blue' : 'red';

      const final_p = p_vals[SHEETS-1];
const finalTotals = sheetTotals[SHEETS - 1];

      // Advance the RNG sequence to stay in sync with File 1
      const syncRoll = rnd();

      let final_majority_color;
      if (finalTotals.totalBlue > finalTotals.totalRed) {

      } else if (finalTotals.totalRed > finalTotals.totalBlue) {

        runIndex: runIdx+1,
        start_p,
        walk_sd,
        p_vals,
        groups,
        assignment,
        cumulative_blue_fracs,
        sheetTotals,            // added: totals per sheet
        crossings: run_crossings, // run-level crossings (same for all sheets of this run)
        final_p,
        final_majority_color
      });
    }
    return runs;

  // recompute crossings
  let run_crossings = 0;

  for (let curIdx = 2; curIdx < SHEETS; curIdx++) {

    const prev = r.sheetTotals[curIdx - 1];
    const cur = r.sheetTotals[curIdx];

    if (prev.totalBlue === prev.totalRed) continue;
    if (cur.totalBlue === cur.totalRed) continue;

    const prevMajor =
      prev.totalBlue > prev.totalRed ? 'blue' : 'red';

    const curMajor =
      cur.totalBlue > cur.totalRed ? 'blue' : 'red';

    if (prevMajor !== curMajor) {
      run_crossings++;
    }
  }

  r.crossings = run_crossings;

  // Preserve the mirrored final-majority colour under colour swapping.
  // If the original majority was blue, the swapped counterpart is red, and vice versa.
  if (run.final_majority_color === 'blue') {
    r.final_majority_color = 'red';
  } else if (run.final_majority_color === 'red') {
    r.final_majority_color = 'blue';
  } else {
    r.final_majority_color = run.final_majority_color;
  }
  r.swapped = true;

  return r;
});

// Combine original + swapped.
// The combined array always contains the same 32 seeded stimuli.
// runIndex/runID remains stable stimulus identity.
let runs = [...baseRuns, ...swappedRuns];

console.log("Total runs:", runs.length);

// Randomise presentation order separately for each participant using a
// subject-seeded Fisher-Yates shuffle. This preserves the same 32 seeded
// trials overall, while varying only their order across participants.
for (let i = runs.length - 1; i > 0; i--) {
  const j = Math.floor(participantRnd() * (i + 1));
  [runs[i], runs[j]] = [runs[j], runs[i]];
}

/* ===== PER-PARTICIPANT BALL-LOCATION RANDOMISATION (added) =====
   Keeps every per-sheet blue/red proportion EXACTLY as the mulberry32
   seed determines it (reveal-order colour sequence and group sizes are
   untouched). Only GRID POSITIONS are re-mapped via the participant RNG.
   Each swapped twin ALSO receives its OWN independent randomised layout
   (same scheme, from the participant RNG), so all 32 trials have unique
   ball locations; twin per-sheet colour counts stay seed-exact. Drawn AFTER the order
   shuffle and keyMapping so run order / key mapping are unchanged. */
(function(){
  function __shuffledPositions(prng){
    var positions=[];
    for (var r=1;r<=GRID_ROWS;r++) for (var c=1;c<=GRID_COLS;c++) positions.push({r:r,c:c});
    for (var i=positions.length-1;i>0;i--){
      var j=Math.floor(prng()*(i+1));
      var t=positions[i]; positions[i]=positions[j]; positions[j]=t;
    }
    return positions;
  }
  function __remapRunLocations(run, newPositions){
    var order=[];
    for (var g=0; g<run.groups.length; g++){
      for (var k=0;k<run.groups[g].length;k++) order.push(run.groups[g][k]);
    }
    var seqColors = order.map(function(cell){ return run.assignment[cell.r+'-'+cell.c]; });
    var newGroups=[]; var idx=0;
    for (var g2=0; g2<run.groups.length; g2++){
      var size=run.groups[g2].length;
      newGroups.push(newPositions.slice(idx, idx+size).map(function(c){ return {r:c.r,c:c.c}; }));
      idx+=size;
    }
    var newAssignment={}; var n=0;
    for (var g3=0; g3<newGroups.length; g3++){
      for (var m=0;m<newGroups[g3].length;m++){
        var cell=newGroups[g3][m];
        newAssignment[cell.r+'-'+cell.c]=seqColors[n++];
      }
    }
    run.groups=newGroups;
    run.assignment=newAssignment;
  }
  function __rot(cell){ return { r: (GRID_ROWS+1)-cell.r, c: (GRID_COLS+1)-cell.c }; }
  function __flip(color){ return (color==='blue') ? 'red' : ((color==='red') ? 'blue' : color); }
  function __deriveRotatedTwin(twin, base){
    var newGroups=[]; var newAssignment={};
    for (var g=0; g<base.groups.length; g++){
      var grp=[];
      for (var k=0; k<base.groups[g].length; k++){
        var bcell=base.groups[g][k];
        var tcell=__rot(bcell);
        grp.push({r:tcell.r, c:tcell.c});
        newAssignment[tcell.r+'-'+tcell.c]=__flip(base.assignment[bcell.r+'-'+bcell.c]);
      }
      newGroups.push(grp);
    }
    twin.groups=newGroups;
    twin.assignment=newAssignment;
  }
  try {
    for (var i=0; i<baseRuns.length; i++){
      var pos = __shuffledPositions(participantRnd);
      __remapRunLocations(baseRuns[i], pos);
      if (swappedRuns[i]) { __remapRunLocations(swappedRuns[i], __shuffledPositions(participantRnd)); }
    }
  } catch(e){ console.error('ball-location randomisation failed', e); }
})();

return runs;
}

// This file's task stream salt ('SRCH'). Combined-stream files pass each
// phase's own salt to buildRunsForSalt.
const TASK_STREAM_SALT = 0x53524348; // 'SRCH' — maintask uses 'MAIN', feedback uses 'FEED'
const TASK_STREAM_SALT_B = 0x53524332; // 'SRC2' - block B: same seeded stimuli, independent order + ball layout
// v1-44: searchtermination presents 64 trials = TWO blocks of the SAME 32 seeded
// stimuli (16 runIDs, each original + colour-swapped). Block A (trials 1-32) is
// byte-identical to v1-43 (salt 'SRCH'); block B (trials 33-64) is the SAME 32
// seeded stimuli redrawn with an INDEPENDENT participant presentation order and
// ball-location layout from salt 'SRC2'. Both blocks come from
// generate_runs(SEED, RUNS_COUNT), so per-sheet blue/red proportions, run-level
// crossings and the seed's 2-2-2-2-2-2-2 profile are identical across both
// blocks; only presentation order and grid positions differ. runID (1-32) and
// swapped carry over unchanged; trialIndex now runs 1-64.
let runs = buildRunsForSalt(TASK_STREAM_SALT).concat(buildRunsForSalt(TASK_STREAM_SALT_B));

/* ======================= DO NOT REORDER — FRAGILE ==========================
   The A/D colour mapping below is THE FIRST DRAW of the UNSALTED subject
   stream mulberry32(subject). That is the entire mechanism keeping the
   mapping identical for the same participant across maintask/feedback/searchtermination (and across
   both phases of a combined-stream file). If ANY code ever consumes a draw
   from __keyMappingRnd before this line, or introduces another unsalted
   mulberry32(subject) draw earlier in initialisation, every participant's
   mapping silently changes relative to previous versions. After ANY change
   near this code, re-run the draw-neutrality harness (unit_drawneutral.js).
   ========================================================================= */
// Key mapping comes from an UNSALTED subject stream so a participant carrying the
// same subject id across the tasks keeps the same A/D colour mapping.
const __keyMappingRnd = mulberry32(subject);
// v1-12: the PID determines only WHICH COLOUR sits on the LEFT key of the
// participant's response pair (same unsalted draw as before, so the
// colour-side assignment is identical across tasks for a given Prolific
// ID, and the seeded stimulus stream is untouched). The physical key pair
// is chosen by the mouse-hand question on the first screen: right-hand
// mouse -> respond with the left hand -> W/E; left-hand mouse -> O/P.
// keyMapping is assigned there, before any instructions run.
const __blueOnLeftKey = (__keyMappingRnd() < 0.5);
let KEY_LEFT = null;
let KEY_RIGHT = null;
let keyMapping = null;
let mouseHand = null;

function applyMouseHand(hand){
  mouseHand = hand;
  KEY_LEFT  = (hand === 'right') ? 'W' : 'O';
  KEY_RIGHT = (hand === 'right') ? 'E' : 'P';
  keyMapping = {};
  keyMapping[KEY_LEFT]  = __blueOnLeftKey ? 'blue' : 'red';
  keyMapping[KEY_RIGHT] = __blueOnLeftKey ? 'red' : 'blue';
  document.querySelectorAll('#Akey, #AkeyLabel, .exKeyA, .exKeyNameA').forEach(function(el){ el.textContent = KEY_LEFT; });
  document.querySelectorAll('#Dkey, #DkeyLabel, .exKeyD, .exKeyNameB').forEach(function(el){ el.textContent = KEY_RIGHT; });
  if (typeof updateKeyColors === 'function') updateKeyColors();
}

function __askFullscreenThen(cont){

  // screen (the device gate, when triggered, overlays it at a higher
  // z-index). Clicking the button attempts fullscreen inside the user
  // gesture; if the browser refuses or lacks the API, we proceed anyway —
  // fullscreen is best-effort and never blocks the participant.
  if (window.__fullscreenPromptDone){ cont(); return; }
  const ov = document.createElement('div');

/* ==== v1-21: fullscreen requirement + prompt counter ==== */
window.__fsPromptCount = 0;
window.__pointingDevice = null;
(function(){
  function isFs(){
    try { if (document.fullscreenElement) return true; } catch(e){}
    try { if (window.parent && window.parent !== window && window.parent.document && window.parent.document.fullscreenElement) return true; } catch(e){}
    return false;
  }
  function requestFs(){
    try {
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (req){ var p = req.call(el); if (p && typeof p.catch === 'function') p.catch(function(){}); }
    } catch(e){}
  }
  var armed = false, ov = null;
  function showPrompt(){
    if (ov) return;
    window.__fsPromptCount += 1;
    ov = document.createElement('div');
    ov.id = 'fsReturnOverlay';
    ov.style.cssText = 'position:fixed; inset:0; z-index:100000; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; cursor:auto;';
    ov.innerHTML =
      '<div style="font-size:26px; line-height:1.5; max-width:760px; margin-bottom:34px;">Please click the below button to return to full screen mode</div>' +
      '<button id="fsReturnBtn" type="button" style="height:76px; padding:0 36px; background:#000; color:#fff; border:3px solid #000; border-radius:10px; font-size:26px; font-weight:800; letter-spacing:1px; cursor:pointer;">Enter full screen mode</button>' +
      '<div style="font-size:16px; line-height:1.4; color:#666; max-width:760px; margin-top:22px;">If nothing happens, please click the button again.</div>';
    document.body.appendChild(ov);
  }
  function hidePrompt(){
    if (ov){ ov.remove(); ov = null; }
  }
  function onChange(){
    if (isFs()){ armed = true; hidePrompt(); }
    else if (armed){ showPrompt(); }
  }
  /* v1-45: own the return-to-fullscreen button at the very start of the capture
     phase. Registered at load, before any screen installs its own listeners, so
     no later capture-phase handler (e.g. a manip-check "click anywhere" screen)
     can call stopImmediatePropagation and swallow the click before the button
     acts. While the prompt is up, a click on the button re-requests fullscreen
     and any other click is swallowed so the task underneath cannot receive it.
     There is no auto-dismiss: the prompt stays until fullscreen is actually
     restored (onChange removes it), so a participant who has been in fullscreen
     must return to it in order to continue. */
  document.addEventListener('click', function(ev){
    if (!ov) return;
    var tgt = ev.target;
    var onBtn = tgt && ((tgt.id === 'fsReturnBtn') || (tgt.closest && tgt.closest('#fsReturnBtn')));
    if (onBtn){ requestFs(); }
    ev.stopImmediatePropagation(); ev.preventDefault();
  }, true);
  /* swallow all keys while the return-to-fullscreen prompt is up */
  document.addEventListener('keydown', function(ev){
    if (ov){ ev.stopImmediatePropagation(); ev.preventDefault(); }
  }, true);
  try { document.addEventListener('fullscreenchange', onChange); } catch(e){}
  try {
    if (window.parent && window.parent !== window && window.parent.document){
      window.parent.document.addEventListener('fullscreenchange', onChange);
    }
  } catch(e){}
  setTimeout(function(){ if (isFs()) armed = true; }, 300);
})();

/* ==== v1-21: hide the cursor whenever the trial grid is on screen ==== */
(function(){
  function vis(el){
    if (!el) return false;
    try {
      if (el.offsetParent === null) return false;
      var cs = getComputedStyle(el);
      return cs.display !== 'none' && cs.visibility !== 'hidden';
    } catch(e){ return false; }
  }
  setInterval(function(){
    var show = false;
    try {
      var cw = document.getElementById('canvasWrap');
      var cup = document.getElementById('cupOverlay');
      var teo = document.getElementById('trialEndOverlay');
      show = vis(cw) && !vis(cup) && !vis(teo);

    try { document.body.classList.toggle('gridCursorHide', show); } catch(e){}
    /* v1-40: not-allowed whenever blocked from advancing (unless the grid is up,
       in which case the cursor stays hidden). */
    var blocked = false;
    if (!show){
      try { blocked = (typeof window.__isAdvanceBlocked === 'function') && !!window.__isAdvanceBlocked(); } catch(e){ blocked = false; }
    }
    try { document.body.classList.toggle('blockedCursor', blocked); } catch(e){}
  }, 150);
})();

  const crossingCounts = runs.map(r=>r.crossings);
  const meanCrossings = crossingCounts.reduce((a,b)=>a+b,0)/crossingCounts.length;
  const freq = {}; for (const c of crossingCounts) freq[c]=(freq[c]||0)+1;
  console.log('Seed summary', {meanCrossings, freq});

  const bottomCanvas = document.getElementById('bottomCanvas');
  const topCanvas = document.getElementById('topCanvas');
  const bottomCtx = bottomCanvas.getContext('2d');
  const topCtx = topCanvas.getContext('2d');
  const canvasSize = bottomCanvas.width;
  const cellSize = Math.floor(canvasSize / GRID_ROWS);
  const padding = Math.floor((canvasSize - cellSize*GRID_ROWS)/2);

  function drawGridForRunSheetTo(context, run, sheetIdx){
    context.clearRect(0,0,canvasSize,canvasSize);
    context.fillStyle = '#ffffff';
    context.fillRect(0,0,canvasSize,canvasSize);
    if (!IMG_BLUE || !IMG_RED || !IMG_CLOSED){
      context.fillStyle = '#f0f0f0';
      context.fillRect(0,0,canvasSize,canvasSize);
      context.fillStyle = '#666';
      context.font = '14px system-ui';
      context.textAlign = 'center';
      context.fillText('Loading images...', canvasSize/2, canvasSize/2);
      return;
    }
    for (let r = 1; r <= GRID_ROWS; r++){
      for (let c = 1; c <= GRID_COLS; c++){
        const x = padding + (c-1)*cellSize;
        const y = padding + (r-1)*cellSize;
        let revealed = false;
        if (sheetIdx > 0){
          for (let g = 0; g <= sheetIdx - 1; g++){
            const group = run.groups[g];
            if (!group) continue; // guard: never index past the last reveal group (blank-grid safeguard)
            if (group.some(cell => cell.r === r && cell.c === c)) { revealed = true; break; }
          }
        }
        if (!revealed) {
          context.drawImage(IMG_CLOSED, x+1, y+1, cellSize-2, cellSize-2);
        } else {
          const key = `${r}-${c}`;
          const img = run.assignment[key] === 'blue' ? IMG_BLUE : IMG_RED;
          context.drawImage(img, x+1, y+1, cellSize-2, cellSize-2);
        }
      }
    }
  }

  function showSheetInstantOnBottom(run, sheetIdx){
    drawGridForRunSheetTo(bottomCtx, run, sheetIdx);

  function prepareTopWithSheet(run, sheetIdx){

    topCanvas.style.opacity = '0';
    topCanvas.setAttribute('aria-hidden','false');
  }

  // computeSheetStats returns raw counts and propKnownEvidence only.
  function computeSheetStats(run, sheetIdx) {
    const TOTAL_BOXES = SCHEDULE.total;
    let revealedCells = [];
    if (sheetIdx > 0) {
      for (let g = 0; g <= sheetIdx - 1; g++) {
        revealedCells = revealedCells.concat(run.groups[g]);
      }
    }
    let totalBlue = 0;
    let totalRed = 0;
    for (const cell of revealedCells) {
      const key = `${cell.r}-${cell.c}`;
      const color = run.assignment[key];
      if (color === 'blue') totalBlue++;
      else if (color === 'red') totalRed++;
    }
    const totalKnownCurrent = totalBlue + totalRed;
    let newCells = [];
    if (sheetIdx > 0) {
      newCells = run.groups[sheetIdx - 1] || [];
    }
    let newBlue = 0;
    let newRed = 0;
    for (const cell of newCells) {
      const key = `${cell.r}-${cell.c}`;
      const color = run.assignment[key];
      if (color === 'blue') newBlue++;
      else if (color === 'red') newRed++;
    }
    const prevBlue = totalBlue - newBlue;
    const prevRed = totalRed - newRed;
    const totalRevealed = revealedCells.length;
    const totalClosed = TOTAL_BOXES - totalRevealed;
    const propKnownEvidence = totalKnownCurrent / TOTAL_BOXES;

    return {
      totalClosed,
      totalBlue,
      totalRed,
      prevBlue,
      prevRed,
      newBlue,
      newRed,
      totalKnownCurrent,
      propKnownEvidence
    };
  }

  // crossing moment: whether this sheet causes a majority change compared to previous sheet
  // Exclude transition Sheet1->Sheet2 and exclude ties (either prev or cur equal)
  function computeCrossingMoment(run, sheetIdx) {
    // sheetIdx is zero-based (0..8). We exclude sheetIdx <= 1 (i.e., transitions to sheet 1 and 2).
    if (!run || !Array.isArray(run.sheetTotals)) return 0;
    if (sheetIdx <= 1) return 0; // exclude Sheet1->Sheet2 (sheetIdx==1) and earlier
    const prevIdx = sheetIdx - 1;
    const prev = run.sheetTotals[prevIdx];
    const cur = run.sheetTotals[sheetIdx];
    if (!prev || !cur) return 0;
    if (prev.totalBlue === prev.totalRed) return 0;
    if (cur.totalBlue === cur.totalRed) return 0;
    const prevMajor = (prev.totalBlue > prev.totalRed) ? 'blue' : 'red';
    const curMajor = (cur.totalBlue > cur.totalRed) ? 'blue' : 'red';
    return (prevMajor !== curMajor) ? 1 : 0;
  }

  // After a participant makes a choice, compute all choice-relative proportions and rational metrics.
  function computeChoiceRelativePropsAndRational(resp, chosenColor, prevPredictedColor) {
    const denom = resp.totalKnownCurrent || 0;
    resp.prop_old_chosen = null;
    resp.prop_old_nonchosen = null;
    resp.prop_new_chosen = null;
    resp.prop_new_nonchosen = null;
    resp.prop_old_notlastchosen = null;
    resp.prop_new_notlastchosen = null;
    resp.rational_decision = null;
    resp.rational_change_of_mind = null;

    if (denom > 0) {
      const selIsBlue = (chosenColor === 'blue');
      const prev_selected_count = selIsBlue ? resp.prevBlue : resp.prevRed;
      const prev_nonselected_count = selIsBlue ? resp.prevRed : resp.prevBlue;
      const new_selected_count = selIsBlue ? resp.newBlue : resp.newRed;
      const new_nonselected_count = selIsBlue ? resp.newRed : resp.newBlue;

      resp.prop_old_chosen = prev_selected_count / denom;
      resp.prop_old_nonchosen = prev_nonselected_count / denom;
      resp.prop_new_chosen = new_selected_count / denom;
      resp.prop_new_nonchosen = new_nonselected_count / denom;

      const sum4 = resp.prop_old_chosen + resp.prop_old_nonchosen + resp.prop_new_chosen + resp.prop_new_nonchosen;
      if (sum4 > 0) {
        resp.prop_old_chosen /= sum4;
        resp.prop_old_nonchosen /= sum4;
        resp.prop_new_chosen /= sum4;
        resp.prop_new_nonchosen /= sum4;
      }
    }

    if (denom > 0 && prevPredictedColor) {
      const notLastIsBlue = (prevPredictedColor === 'red');
      const prev_notlast_count = notLastIsBlue ? resp.prevBlue : resp.prevRed;
      const new_notlast_count = notLastIsBlue ? resp.newBlue : resp.newRed;
      resp.prop_old_notlastchosen = prev_notlast_count / denom;
      resp.prop_new_notlastchosen = new_notlast_count / denom;
    }

    // rational_decision: does the participant's choice map to the color with more total balls at current sheet?
    if (denom > 0) {
      if (resp.totalBlue === resp.totalRed) {
        resp.rational_decision = null;
      } else {
        const majorityColor = (resp.totalBlue > resp.totalRed) ? 'blue' : 'red';
        resp.rational_decision = (chosenColor === majorityColor) ? 1 : 0;
      }
    } else {
      resp.rational_decision = null;
    }

    // rational_change_of_mind: only meaningful when change_of_mind === 1
    if (resp.change_of_mind === 1) {
      if (denom === 0 || resp.totalBlue === resp.totalRed) {
        resp.rational_change_of_mind = null;
      } else {
        const majorityColor = (resp.totalBlue > resp.totalRed) ? 'blue' : 'red';
        resp.rational_change_of_mind = (chosenColor === majorityColor) ? 1 : 0;
      }
    } else {
      resp.rational_change_of_mind = null;
    }
  }

  const cupOverlay = document.getElementById('cupOverlay');
  const cupSVG = document.getElementById('cupSVG');

  const trialEndOverlay = document.getElementById('trialEndOverlay');
  const trialEndText = document.getElementById('trialEndText');

  const CUP_TOP = 22, CUP_BOTTOM = 218, CUP_HEIGHT = CUP_BOTTOM - CUP_TOP;
  const INTERNAL_MIN = 0, INTERNAL_MAX = SCHEDULE.total;
  function drawBeakerLines(){
    while (beakerLinesGroup.firstChild) beakerLinesGroup.removeChild(beakerLinesGroup.firstChild);
    const lines = 9;
    for (let i=0;i<lines;i++){
      const frac = i/(lines-1);

      const line = document.createElementNS('http://www.w3.org/2000/svg','line');

      line.setAttribute('stroke','#999'); line.setAttribute('stroke-width','1');

  }
  drawBeakerLines();

  function valueToY(val){ const frac=(val-INTERNAL_MIN)/(INTERNAL_MAX-INTERNAL_MIN); return CUP_BOTTOM - frac*CUP_HEIGHT; }
  /* ===== Confidence-trajectory capture (v1-8) ================================
   Records the cup marker's path during every confidence rating: threshold-
   decimated (kept when the value changed AND >=10ms since the last kept
   sample; the final value is always appended at release), serialised as
   "t:v;t:v;..." with t = ms since the rating screen appeared and v = the
   0-256 cup value. Per-rating hesitancy metrics are computed at release.
   Capacity-capped (thin-by-half beyond 2000 samples). Consumes no random
   draws and touches no response mechanics. */
let __cupTraj = null, __cupTrajT0 = 0, __cupTrajLast = null, __cupTrajLastT = 0;
function __cupTrajBegin(v){
  __cupTrajT0 = performance.now();
  __cupTraj = [[0, v]];
  __cupTrajLast = v;
  __cupTrajLastT = 0;
}
function __cupTrajRecord(v){
  if (!__cupTraj) return;
  if (v === __cupTrajLast) return;
  const t = Math.max(0, Math.round(performance.now() - __cupTrajT0));
  if (t - __cupTrajLastT < 10) return;
  __cupTraj.push([t, v]);
  __cupTrajLast = v; __cupTrajLastT = t;
  if (__cupTraj.length > 2000){
    const kept = [__cupTraj[0]];
    for (let i=2; i<__cupTraj.length; i+=2) kept.push(__cupTraj[i]);
    __cupTraj = kept;
    __cupTrajLast = kept[kept.length-1][1];
    __cupTrajLastT = kept[kept.length-1][0];
  }
}
function __cupTrajFinalize(finalValue){
  if (!__cupTraj) return null;
  const tNow = Math.max(0, Math.round(performance.now() - __cupTrajT0));
  if (finalValue !== __cupTrajLast) __cupTraj.push([tNow, finalValue]);
  const T = __cupTraj; __cupTraj = null;
  let reversals=0, path=0, lastDir=0, firstMoveT=null, longestPause=0, maxV=T[0][1];
  for (let i=1; i<T.length; i++){
    const dv = T[i][1]-T[i-1][1], dt = T[i][0]-T[i-1][0];
    path += Math.abs(dv);
    if (dv !== 0){
      const dir = dv > 0 ? 1 : -1;
      if (lastDir !== 0 && dir !== lastDir) reversals++;
      lastDir = dir;
      if (firstMoveT === null) firstMoveT = T[i][0];
    }
    if (dt > longestPause) longestPause = dt;
    if (T[i][1] > maxV) maxV = T[i][1];
  }
  const finalDwell = tNow - T[T.length-1][0];
  if (finalDwell > longestPause) longestPause = finalDwell;
  const net = Math.abs(T[T.length-1][1] - T[0][1]);
  return {
    confidence_trajectory: T.map(p => p[0] + ':' + p[1]).join(';'),
    conf_traj_reversals: reversals,
    conf_traj_path_length: path,
    conf_traj_net_gross_ratio: path > 0 ? Math.round((net/path)*1000)/1000 : null,
    conf_traj_time_to_first_move: (firstMoveT === null) ? null : firstMoveT,
    conf_traj_longest_pause: longestPause,
    conf_traj_final_dwell: finalDwell,
    conf_traj_max_value: maxV
  };
}

function setCupValue(val){
    val = Math.max(INTERNAL_MIN, Math.min(INTERNAL_MAX, Math.round(val)));
    const y = valueToY(val);
    const height = CUP_BOTTOM - y;
    liquidRect.setAttribute('y', y);
    liquidRect.setAttribute('height', height);
    handle.setAttribute('cy', y);
    cupState.currentValue = val;
    __cupTrajRecord(val);
  }
  const cupState = { currentValue:0, dragging:false, hasMoved:false, initialX:0, initialY:0, dragOffsetY:0, lastSubmitX:null, lastSubmitY:null };
  setCupValue(cupState.currentValue);

  function svgPoint(evt){
    const pt = cupSVG.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    const ctm = cupSVG.getScreenCTM().inverse();
    return pt.matrixTransform(ctm);
  }

  function pointerDown(evt){
    evt.preventDefault();
    evt.stopPropagation();

    cupState.dragging = true;
    cupState.hasMoved = false;
    cupState.initialX = evt.clientX;
    cupState.initialY = evt.clientY;

    const p = svgPoint(evt);
    cupState.dragOffsetY = p.y - valueToY(cupState.currentValue);

    if (handle.setPointerCapture && evt.pointerId !== undefined) {
      try { handle.setPointerCapture(evt.pointerId); } catch(e) {}
    }

    document.addEventListener('pointermove', pointerMove);
    document.addEventListener('pointerup', pointerUp);
  }
  function pointerMove(evt){
    if (!cupState.dragging) return;
    evt.preventDefault();

    // The marker must actually be dragged before release can submit a rating.
    if (!cupState.hasMoved) {
      const dx = Math.abs(evt.clientX - cupState.initialX);
      const dy = Math.abs(evt.clientY - cupState.initialY);
      if (dx >= 1 || dy >= 1) {
        cupState.hasMoved = true;
      }
    }

    const p = svgPoint(evt);
    let y = Math.max(CUP_TOP, Math.min(CUP_BOTTOM, p.y - cupState.dragOffsetY));
    const frac = (CUP_BOTTOM - y) / CUP_HEIGHT;
    const val = Math.round(INTERNAL_MIN + frac * (INTERNAL_MAX - INTERNAL_MIN));
    setCupValue(val);
  }
  function pointerUp(evt){
    if (!cupState.dragging) return;
    evt.preventDefault();

    cupState.dragging = false;
    document.removeEventListener('pointermove', pointerMove);
    document.removeEventListener('pointerup', pointerUp);

    if (handle.releasePointerCapture && evt.pointerId !== undefined) {
      try { handle.releasePointerCapture(evt.pointerId); } catch(e) {}
    }

    // Do not submit from a simple click. The participant must drag the marker.
    if (cupState.hasMoved) {
      cupState.lastSubmitX = evt.clientX;
      cupState.lastSubmitY = evt.clientY;
      submitConfidenceByRelease();
    }
  }
  handle.addEventListener('pointerdown', pointerDown);
  cupSVG.addEventListener('keydown', (ev) => {
    /* v1-21: arrow keys no longer move the confidence marker (click-drag only) */
  });

/* ===== Commit-screen trajectory capture (v1-9) =============================
   Records pointer movement along the YES<->NO axis while the commit decision
   screen is up, to capture wavering between the options. Samples are
   "t:x;t:x;..." with t = ms since the commit screen appeared and x = the
   pointer's normalised position on the axis through the two button centres
   (0 = YES centre, 1 = NO centre; values outside [0,1] lie beyond them),
   decimated (>=0.005 change AND >=10ms). Hover times, Y<->N hover switches,
   and the decision RT are computed at the decision. Recording starts empty
   (the pointer's position is unknown until it first moves). Capacity-capped
   (thin-by-half beyond 2000 samples). No random draws consumed. */
let __commitTraj=null, __commitTrajT0=0, __commitTrajLastX=null, __commitTrajLastY=null, __commitTrajLastT=0,
    __commitYesRect=null, __commitNoRect=null, __commitHoverY=0, __commitHoverN=0,
    __commitLastZone='E', __commitZoneSince=0, __commitSwitches=0,
    __commitLastHoverZone=null, __commitFirstHover=null;
function __commitTrajBegin(){
  try{
    const yb=document.getElementById('commitYesBtn'), nb=document.getElementById('commitNoBtn');
    __commitYesRect = yb ? yb.getBoundingClientRect() : null;
    __commitNoRect  = nb ? nb.getBoundingClientRect() : null;
  }catch(e){ __commitYesRect=__commitNoRect=null; }
  __commitTrajT0=performance.now();
  __commitTraj=[]; __commitTrajLastX=null; __commitTrajLastY=null; __commitTrajLastT=0;
  __commitHoverY=0; __commitHoverN=0; __commitLastZone='E'; __commitZoneSince=0;
  __commitSwitches=0; __commitLastHoverZone=null; __commitFirstHover=null;
}
function __commitAxisX(clientX){
  if(!__commitYesRect || !__commitNoRect) return null;
  const yc=__commitYesRect.left+__commitYesRect.width/2;
  const nc=__commitNoRect.left+__commitNoRect.width/2;
  const span=(nc-yc)||1;
  return Math.round(((clientX-yc)/span)*1000)/1000;
}
function __commitAxisY(clientY){
  if(!__commitYesRect || !__commitNoRect) return null;
  const yc=__commitYesRect.left+__commitYesRect.width/2;
  const nc=__commitNoRect.left+__commitNoRect.width/2;
  const span=(nc-yc)||1;
  /* vertical middle of the two buttons; screen y grows downward, so subtract
     clientY to make ABOVE the middle positive and BELOW negative. Same span as
     x so the axes share units. */
  const midY=((__commitYesRect.top+__commitYesRect.height/2)+(__commitNoRect.top+__commitNoRect.height/2))/2;
  return Math.round(((midY-clientY)/span)*1000)/1000;
}
function __commitZoneAt(x,y){
  const inR=r=>r && x>=r.left && x<=r.right && y>=r.top && y<=r.bottom;
  if(inR(__commitYesRect)) return 'Y';
  if(inR(__commitNoRect)) return 'N';
  return 'E';
}
function __commitTrajMove(clientX, clientY){
  if(!__commitTraj) return;
  const t=Math.max(0,Math.round(performance.now()-__commitTrajT0));
  const z=__commitZoneAt(clientX, clientY);
  if(z!==__commitLastZone){
    if(__commitLastZone==='Y') __commitHoverY += t-__commitZoneSince;
    if(__commitLastZone==='N') __commitHoverN += t-__commitZoneSince;
    if(z==='Y'||z==='N'){
      if(__commitFirstHover===null) __commitFirstHover=t;
      if(__commitLastHoverZone && __commitLastHoverZone!==z) __commitSwitches++;
      __commitLastHoverZone=z;
    }
    __commitLastZone=z; __commitZoneSince=t;
  }
  const x=__commitAxisX(clientX);
  if(x===null) return;
  const y=__commitAxisY(clientY);
  const __movedX=(__commitTrajLastX===null)||(Math.abs(x-__commitTrajLastX)>=0.005);
  const __movedY=(__commitTrajLastY===null)||(y===null?false:Math.abs(y-__commitTrajLastY)>=0.005);
  if(!__movedX && !__movedY) return;
  if(__commitTraj.length>0 && t-__commitTrajLastT<10) return;
  __commitTraj.push([t,x,y]);
  __commitTrajLastX=x; __commitTrajLastY=y; __commitTrajLastT=t;
  if(__commitTraj.length>2000){
    const kept=[__commitTraj[0]];
    for(let i=2;i<__commitTraj.length;i+=2) kept.push(__commitTraj[i]);
    __commitTraj=kept;
    __commitTrajLastX=kept[kept.length-1][1];
    __commitTrajLastY=kept[kept.length-1][2];
    __commitTrajLastT=kept[kept.length-1][0];
  }
}
function __commitTrajFinalize(){
  if(!__commitTraj) return null;
  const t=Math.max(0,Math.round(performance.now()-__commitTrajT0));
  if(__commitLastZone==='Y') __commitHoverY += t-__commitZoneSince;
  if(__commitLastZone==='N') __commitHoverN += t-__commitZoneSince;
  const T=__commitTraj; __commitTraj=null;
  let path=0, longest=0;
  for(let i=1;i<T.length;i++){
    path += Math.abs(T[i][1]-T[i-1][1]);
    const dt=T[i][0]-T[i-1][0]; if(dt>longest) longest=dt;
  }
  if(T.length){ const tail=t-T[T.length-1][0]; if(tail>longest) longest=tail; }
  else longest=t;
  return {
    commit_trajectory: T.map(p=>p[0]+':'+p[1]+':'+((p[2]===null||typeof p[2]==='undefined')?'':p[2])).join(';'),
    commit_traj_switches: __commitSwitches,
    commit_traj_hover_yes_ms: Math.round(__commitHoverY),
    commit_traj_hover_no_ms: Math.round(__commitHoverN),
    commit_traj_time_to_first_hover: (__commitFirstHover===null) ? null : __commitFirstHover,
    commit_traj_path_length: Math.round(path*1000)/1000,

}

    document.getElementById('commitYesBtn');

  const noBtn =
    document.getElementById('commitNoBtn');

  if (yesBtn){
    yesBtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      ev.preventDefault();
      if (isEmptyGrid) return;   // committing is not allowed on the all-closed grid
      handleCommitDecision(true);
    });
  }

  if (noBtn){
    noBtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      ev.preventDefault();
      handleCommitDecision(false);
    });
  }

  __commitTrajBegin();
}

function handleCommitDecision(commitNow){

  if (!awaitingCommitDecision || !pendingCommitResponse) return;
  if (commitNow && currentSheet === 0) return;   // no committing on the all-closed grid
  if (!commitNow && currentSheet >= 8) return;   // NO is disabled at the final reveal

  // v1-9: the commit-screen trajectory ends at the decision; the fields land
  // on this guess's response object and its sheet row (every guess row has a
  // commit decision, including the forced NO on sheet 0).
  {
    const __ctOut = __commitTrajFinalize();
    if (__ctOut){
      Object.assign(pendingCommitResponse, __ctOut);
      if (typeof inStrategyPractice === 'undefined' || !inStrategyPractice){
        const __tr = trialData[currentTrial];
        const __row = __tr && Array.isArray(__tr.sheetRows) ? __tr.sheetRows[currentSheet] : null;
        if (__row) Object.assign(__row, __ctOut);
      }
    }
  }

  if (commitNow){

    const tr =
      trialData[currentTrial];

    const run =
      runs[currentTrial];

    const possiblePoints =
      availablePointsForSheetIndex(currentSheet);

    const pointsEarned =
      (pendingCommitResponse.choice === run.final_majority_color)
        ? possiblePoints
        : -possiblePoints;

    pendingCommitResponse.points = pointsEarned;

    if (tr){
      tr.finalChoice = pendingCommitResponse.choice;
      tr.predictionSheet = currentSheet + 1;
      tr.choiceRT = pendingCommitResponse.choiceRT;
      tr.choice_rt_from_sheet_onset = pendingCommitResponse.choice_rt_from_sheet_onset;
    }

    const row =
      tr && Array.isArray(tr.sheetRows)
        ? tr.sheetRows[currentSheet]
        : null;

    if (row){
      row.points = pointsEarned;
    }

    awaitingCommitDecision = false;
    predictionCommitted = true;

    trialEndOverlay.style.display = 'none';
    trialEndOverlay.setAttribute('aria-hidden','true');

    showConfidence();

    return;
  }

  if (currentSheet >= 8){
    return;
  }

  hideCommitDecisionScreen();

  predictionCommitted = false;
  revealLocked = false;
  uiLocked = false;

  advanceToNextSheet();
}

/* Give the five commit-screen example frames identical geometry: measure each
   at its natural size (offscreen), then fix all of them to the tallest, with
   content vertically centred inside the fixed box. Width is already constant
   (min(620px, 86vw)) at gated window sizes, so one measurement suffices. */
(function equalizeMockFrames(){
  try {
    var frames = Array.prototype.slice.call(document.querySelectorAll('.mockFrame'));
    if (!frames.length) return;
    var slides = frames.map(function(f){ return f.closest('.instructionSlide'); });
    var restore = slides.map(function(sl){ return [sl, sl.style.display]; });

    /* Everything below happens synchronously in one script block, so the
       browser never paints the temporary states: no flash. Slides are
       measured IN FLOW (normal width and wrapping), giving exact live
       geometry at the participant's window size. */
    slides.forEach(function(sl){ sl.style.display='flex'; });

    /* Stage 1: pin all five frames to the tallest frame. */
    var maxF = 0;
    frames.forEach(function(f){ maxF = Math.max(maxF, f.offsetHeight); });
    if (maxF > 0){
      frames.forEach(function(f){
        f.style.height = (maxF + 6) + 'px';
        f.style.display = 'flex';
        f.style.flexDirection = 'column';
        f.style.justifyContent = 'center';
      });
    }

    /* Stage 2: pin all five SLIDES to the tallest slide (measured with the
       pinned frames in place). The slides' container centres each slide as a
       whole block, so differing below-frame content (a missing or shorter
       explanatory line) shifts everything; equal slide heights make the
       centring identical, and flex-start keeps content pinned to the top of
       each equal-height slide. */
    var maxS = 0;
    slides.forEach(function(sl){ maxS = Math.max(maxS, sl.offsetHeight); });

    restore.forEach(function(r){ r[0].style.display = r[1] || 'none'; });

    if (maxS > 0){
      slides.forEach(function(sl){ sl.style.minHeight = (maxS + 4) + 'px'; });
    }
  } catch(e){ /* never block the task over cosmetics */ }
})();


/* v1-16: a fixed, participant-independent arrangement for the two "definitely"
   example grids. __buildFixed7525() creates the 75%-blue / 25%-red layout once
   from a constant-seeded local RNG (its own mulberry32 instance — NOT the
   stimulus seed, so seed integrity is untouched). getFixedExampleCells('blue')
   returns that 75/25 grid; getFixedExampleCells('red') returns its exact
   colour-swapped, 180°-rotated copy (the 25/75 grid). Both are identical for
   every participant. */
function __fixedExampleMulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;

  if (__fixed7525Cache) return __fixed7525Cache;
  var rnd = __fixedExampleMulberry32(1957);   // constant seed => same for everyone

  for (var r = 0; r < 16; r++){
    for (var c = 0; c < 16; c++){ cells.push({ r: r, c: c }); }
  }
  // Fisher–Yates on the colour list only (positions are the fixed grid order),
  // giving a spatially mixed but deterministic 192-blue / 64-red arrangement.
  var colors = [];
  for (var i = 0; i < 192; i++) colors.push('blue');
  for (var j = 0; j < 64; j++) colors.push('red');
  for (var k = colors.length - 1; k > 0; k--){
    var m = Math.floor(rnd() * (k + 1));
    var tmp = colors[k]; colors[k] = colors[m]; colors[m] = tmp;
  }
  __fixed7525Cache = cells.map(function(cell, idx){
    return { r: cell.r, c: cell.c, color: colors[idx] };
  });
  return __fixed7525Cache;
}
function getFixedExampleCells(majorityColor){
  var base = __buildFixed7525();
  if (majorityColor === 'blue'){
    // the 75/25 grid, as built
    return base.map(function(x){ return { r: x.r, c: x.c, color: x.color }; });
  }
  // the 25/75 grid: colour-swapped 180° rotation of the 75/25 grid
  return base.map(function(x){
    return {
      r: 15 - x.r,
      c: 15 - x.c,
      color: (x.color === 'blue') ? 'red' : 'blue'

  });

function generateRandomExampleCells(blueCount, redCount){

  for (let i=0;i<blueCount;i++) colors.push('blue');

/* ===== Fixed pseudo-random example layouts (identical for every participant)
   All randomness comes from ONE fresh mulberry32 instance with a hard-coded
   constant seed - never the subject id, never the stimulus SEED stream - so
   every participant sees the same layouts and no shared RNG stream is
   touched. The whole package is computed once and memoised, so repeated
   renders (e.g. the goal-check review replay) are identical.
   Spatial rule: reveal groups come from a randomly permuted cyclic Latin
   square, so EVERY 32-cell group contains exactly 2 cells in each row and 2
   in each column while looking scattered rather than patterned. Colours are
   plain shuffles within each group. The 20/12 partial example and the
   red-majority animation are the colour-swapped, 180-degree-rotated
   counterparts of the 12/20 example and the blue-majority animation, step by
   step. Applies to instruction examples/animations ONLY, never the trials. */
function __fixedExampleLayout(){
  if (window.__exampleLayoutCache) return window.__exampleLayoutCache;

  const rnd = mulberry32(0xE7A5C0DE);
  const shuffle = a => {
    for (let i=a.length-1; i>0; i--){
      const j = Math.floor(rnd()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  };

  // Randomly permuted cyclic Latin square: symbol(r,c) = ps[(pr[r]+pc[c])%16].
  // Each symbol appears once per row and column; pairing symbols {2g, 2g+1}
  // gives 8 groups with exactly 2 cells per row and per column each.
  const pr = shuffle([...Array(16).keys()]);
  const pc = shuffle([...Array(16).keys()]);
  const ps = shuffle([...Array(16).keys()]);

  const groups = Array.from({length:8}, () => []);
  for (let r=0; r<16; r++){
    for (let c=0; c<16; c++){
      const sym = ps[(pr[r] + pc[c]) % 16];
      groups[Math.floor(sym/2)].push({ r, c });
    }
  }

  // One shuffled index order per group: colouring any k cells "majority"
  // means taking the first k positions of that group's order, so a single
  // frozen permutation serves the partial example and every animation step.
  const colorOrder = groups.map(() => shuffle([...Array(32).keys()]));
  const colorRank  = colorOrder.map(ord => {
    const rank = new Array(32);
    ord.forEach((cellIdx, pos) => { rank[cellIdx] = pos; });
    return rank;
  });

  ctx.fillRect(0,0,canvas.width,canvas.height);

  for (let r=0; r<16; r++){

    for (let c=0; c<16; c++){

      const x =
        padding + (c * cellSize);

      const y =
        padding + (r * cellSize);

      const revealed =
        revealedCells.find(
          cell => cell.r===r && cell.c===c
        );

      if (!revealed){

        ctx.drawImage(
          IMG_CLOSED,
          x + 1,
          y + 1,
          cellSize - 2,
          cellSize - 2
        );

      } else {

        const img =
          revealed.color === 'blue'
          ? IMG_BLUE
          : IMG_RED;

        ctx.drawImage(
          img,
          x + 1,
          y + 1,
          cellSize - 2,
          cellSize - 2
        );
      }
    }
  }
}

  drawCurrentState();

  for (let sheet=1; sheet<=8; sheet++){

    setTimeout(()=>{

      const start =
        (sheet - 1) * 32;

      const nextCells =
        allCells.slice(start, start + 32);

      const majCount = MAJ_PER_SHEET[sheet - 1];
      const minCount = 32 - majCount;
      const minorityColor = (majorityColor === 'blue') ? 'red' : 'blue';

      // Frozen pseudo-random colour placement within the new group: the
      // first majCount positions of this group's fixed shuffle are the
      // majority colour.
      const colors = __L.colorRank[sheet - 1].map(rank =>
        rank < majCount ? majorityColor : minorityColor
      );

      nextCells.forEach((cell, idx)=>{

        revealedCells.push({
          r: cell.r,
          c: cell.c,
          color: colors[idx]
        });
      });

      drawCurrentState();

      if (pointsContainer){
        pointsContainer.style.visibility = 'visible';
      }

      const pts =
        availablePointsForSheetIndex(sheet);

      updateWinLoseDisplay(pts, pointsId, barId);

    }, sheet * 1000);
  }
}

    requestAnimationFrame(() => {
      __sheetFadeBeginTs = performance.now();   // v1-43: new balls begin fading in
      topCanvas.style.opacity = '1';

      /* v1-48: the unlock is now scheduled from the same instant as the
         choice_RT zero (__sheetFadeBeginTs) instead of an independent
         setTimeout(revealDelayMs + fadeMs) racing the stamp above. Because the
         stamp is taken inside a requestAnimationFrame, the old independent
         timer could fire up to a frame (~16 ms) sooner than stamp + 150 ms,
         letting accepted responses land at ~134-149 ms recorded RT. Chaining
         guarantees keys unlock no earlier than 150 ms after the recorded zero. */
      setTimeout(() => {
        uiLocked = false;
        revealLocked = false;
        showSheet();
      }, fadeMs);
    });

  }, revealDelayMs);
}

document.addEventListener('keydown', (ev) => {

  // v1-43: log every W/E-or-O/P press in the sheet window (incl. locked/early ones), before the gate
  { const __k = ev.key.toUpperCase();
    if (__pressRecording && keyMapping && (__k === KEY_LEFT || __k === KEY_RIGHT)) {
      __pressLog.push({ color: keyMapping[__k], ts: performance.now() });
      if (!awaitingPrediction) __pressEarly = 1;
    } }

  // BLOCK ALL KEYS DURING TRANSITIONS
  if (uiLocked) return;
  if (responseGateLocked) return;

  const k = ev.key.toUpperCase();

  const trialEndVisible =
    (trialEndOverlay.style.display !== 'none' &&
     trialEndOverlay.getAttribute('aria-hidden') === 'false');

  // Do not let normal task key handling run while a click-to-continue screen is visible.
  if (trialEndVisible) {
    return;
  }

  // PREDICTION RESPONSE
  if (awaitingPrediction && keyMapping && (k === KEY_LEFT || k === KEY_RIGHT)) {

    /* v1-48: hard 150 ms response floor. choiceRT is measured from
       __sheetFadeBeginTs, and the reveal paths now chain the unlock from that
       stamp; this guard additionally enforces the floor by construction -- a
       press earlier than fadeMs (150 ms) after the stamp is logged
       (all_key_presses / early_choice) but not accepted, exactly like a press
       made before the keys appear. */
    if (typeof __sheetFadeBeginTs === 'number' && (performance.now() - __sheetFadeBeginTs) < fadeMs){
      __pressEarly = 1;
      return;
    }

    if (inStrategyPractice){

      if (
        practiceTrialType === 'early' &&
        currentSheet !== practiceConfigs.early.forcedSheet
      ){
        return;
      }

      if (
        practiceTrialType === 'late' &&
        currentSheet !== practiceConfigs.late.forcedSheet
      ){
        return;
      }

      predictionCommitted = true;
      awaitingPrediction = false;

      const choiceColor = keyMapping[k];

      const run = currentPracticeRun;

      const stats =
        computeSheetStats(run, currentSheet);

      const currentPoints =
        practiceConfigs[practiceTrialType].points;

      const pointsEarned =
        choiceColor === run.final_majority_color
          ? currentPoints
          : -currentPoints;

      currentPracticeResponse = {
        sheet: currentSheet + 1,
        choice: choiceColor,
        choiceRT: performance.now(),
        confidence: null,
        confRT: null,
        points: pointsEarned,

        finalTotalBlue: run.sheetTotals[SHEETS - 1].totalBlue,
        finalTotalRed: run.sheetTotals[SHEETS - 1].totalRed,

        ...stats,

        crossing_moment: computeCrossingMoment(run, currentSheet),
        change_of_mind: null,
        prevConfidence: null,
        prevChoiceRT: null
      };

      computeChoiceRelativePropsAndRational(
        currentPracticeResponse,
        choiceColor,
        null
      );

      showConfidence();

      return;
    }

    awaitingPrediction = false;

    const choiceColor = keyMapping[k];

    // Store the current prediction as a candidate. It becomes the committed
    // prediction only if the participant clicks YES on the commit screen.

    // Record whether this guess happened on the too-slow screen, then fully clear
    // the too-slow state: the message must never reappear after the guess is made
    // (the grid returns to normal behind the incoming commit screen).
    const __wasTooSlow = __tooSlowActive ? 1 : 0;
    __cancelTooSlow();
    if (__wasTooSlow){
      bottomCanvas.style.visibility = 'visible'; bottomCanvas.style.opacity = '1';
      topCanvas.style.visibility = '';
    }

    const choiceNow = performance.now();

    const currentSheetLogRow =
      trialData[currentTrial].sheetRows
        ? trialData[currentTrial].sheetRows[currentSheet]
        : null;

    trialData[currentTrial].choiceRT =
      (currentSheetLogRow && typeof currentSheetLogRow.sheetOnset === 'number')
        ? choiceNow - currentSheetLogRow.sheetOnset
        : choiceNow - trialStartTime;

    trialData[currentTrial].choice_rt_from_sheet_onset =
      trialData[currentTrial].choiceRT;

    const run = runs[currentTrial];

    const stats =
      computeSheetStats(run, currentSheet);

    const prevResponse =
      trialData[currentTrial].responses[
        trialData[currentTrial].responses.length - 1
      ];

// Calculate signed points: +80/-80 at first reveal, decreasing by 10 each reveal
    const currentPoints = availablePointsForSheetIndex(currentSheet);
    const pointsEarned = (choiceColor === run.final_majority_color) ? currentPoints : -currentPoints;

const resp = {
  sheet: currentSheet + 1,
  choice: choiceColor,
  choiceRT: trialData[currentTrial].choiceRT,
  choice_rt_from_sheet_onset: trialData[currentTrial].choice_rt_from_sheet_onset,
  too_slow_screen: __wasTooSlow,
  sheet_onset_time:
    (currentSheetLogRow && typeof currentSheetLogRow.sheetOnset === 'number')
      ? currentSheetLogRow.sheetOnset
      : null,
  confidence: null,
  confOnset: null,
  confidence_screen_onset_time: null,
  confidence_rt_from_confidence_onset: null,
  confRT: null,
  points: null,

  // final Sheet9 totals actually used to determine correctness
  finalTotalBlue: run.sheetTotals[SHEETS - 1].totalBlue,
  finalTotalRed: run.sheetTotals[SHEETS - 1].totalRed,

  ...stats,

  crossing_moment: computeCrossingMoment(run, currentSheet),
  // v1-10: null (blank in CSV) on a grid's first guess, matching the
  // main and feedback tasks; previously the falsy prevResponse made
  // the whole ternary condition evaluate to 0.
  change_of_mind: prevResponse ? ((prevResponse.choice !== choiceColor) ? 1 : 0) : null,
  prevConfidence: prevResponse ? prevResponse.confidence : null,
  prevChoiceRT: prevResponse ? prevResponse.choiceRT : null
};

    computeChoiceRelativePropsAndRational(
      resp,
      choiceColor,
      prevResponse ? prevResponse.choice : null
    );

    __finalizePressLog(resp);   // v1-43: attach all_key_presses + early_choice

    trialData[currentTrial].responses.push(resp);

    writeFinalChoiceToSheetLog(resp);

    showCommitDecisionScreen(resp);
  }
});

  if (awaitingPrediction) return;

  if (now - lastRevealClickTime < MIN_REVEAL_CLICK_MS) {

  // CSV helpers: ensure numeric columns are emitted without quotes so Excel imports them as numbers
  function csvEscapeStringCell(s) {
    if (s === null || typeof s === 'undefined') return '';
    const str = String(s);
    if (str.includes('"') || str.includes(',') || str.includes('\n') || str.includes('\r')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }

  const numericColumns = new Set([
    'subject','seed','runsCount','total_time','instruction_time',
    'task_time','summary_meanCrossings','trialIndex','runID','crossings',
    'start_p','walk_sd','final_p','trialEnd','trial_time',
    'sheet','choiceRT','early_choice','confidence','confRT',
    'conf_traj_reversals','conf_traj_path_length','conf_traj_net_gross_ratio','conf_traj_time_to_first_move','conf_traj_longest_pause','conf_traj_final_dwell','conf_traj_max_value',
    'commit_traj_switches','commit_traj_hover_yes_ms','commit_traj_hover_no_ms','commit_traj_time_to_first_hover','commit_traj_path_length','commit_traj_longest_pause','commit_traj_decision_rt','totalClosed',
    'totalBlue','totalRed','prevBlue','prevRed','newBlue',
    'newRed','totalKnownCurrent','propKnownEvidence','prop_old_chosen','prop_old_nonchosen',

    'metacognitive_calibration_trial','metacognitive_calibration_block','prevConfidence','prevChoiceRT','swapped',
    'known_margin_signed_blue','known_margin_signed_red','known_margin_abs','num_switches_so_far','total_switches_trial',
    'choice_probability_correct','choice_matches_selected_color','confidence_change','previous_trial_signed_feedback_surprise','commit_margin_abs',
    'commit_correct_final_majority','stimulus_set_seed','screen_width','screen_height','device_pixel_ratio',
    'window_inner_width','window_inner_height','fullscreen_or_not','visibility_blur_count','image_load_success','prefers_reduced_motion','date_now','max_touch_points','pointer_coarse',
    'trial_start_time','trial_end_time','sheet_onset_time','choice_rt_from_sheet_onset','confidence_screen_onset_time',

    'overall_maintask_matches','overall_feedback_matches','overall_searchtermination_points',
  ]);

  function formatCsvCell(col, val) {
    if (val === null || typeof val === 'undefined' || val === '') return '';
    if (val === 'practice') return 'practice';
    if (numericColumns.has(col)) {
      if (typeof val === 'number' && isFinite(val)) return String(val);
      if (typeof val === 'boolean') return val ? '1' : '0';
      const num = Number(String(val).trim());
      if (!Number.isNaN(num) && isFinite(num)) return String(num);
      return '';
    }
    return csvEscapeStringCell(val);
  }


  function csvNumberOrNull(val){
    if (val === null || typeof val === 'undefined' || val === '') return null;
    const num = Number(val);
    return Number.isFinite(num) ? num : null;
  }

  function pearsonCorrelationFromPairs(pairs){
    if (!pairs || pairs.length < 2) return null;

    const n = pairs.length;
    let sumX = 0;
    let sumY = 0;

    for (const pair of pairs){
      sumX += pair.x;
      sumY += pair.y;
    }

    const meanX = sumX / n;
    const meanY = sumY / n;

    let ssX = 0;
    let ssY = 0;
    let ssXY = 0;

    for (const pair of pairs){
      const dx = pair.x - meanX;
      const dy = pair.y - meanY;
      ssX += dx * dx;
      ssY += dy * dy;
      ssXY += dx * dy;
    }

    if (ssX <= 0 || ssY <= 0) return null;

    return ssXY / Math.sqrt(ssX * ssY);
  }

  function addDerivedCsvFields(rows, options){
    options = options || {};

    const includeTrialCalibration = options.includeTrialCalibration !== false;
    const includeFeedbackHistory = options.includeFeedbackHistory === true;
    const includeSwitchFields = options.includeSwitchFields === true;
    const includeFeedbackSurprise = options.includeFeedbackSurprise === true;
    const includeSearchCommitFields = options.includeSearchCommitFields === true;

    // Row-level selected/nonselected evidence totals and stimulus-evidence margins.
    for (const row of rows){
      const propOldSelected = csvNumberOrNull(row.prop_old_chosen);
      const propNewSelected = csvNumberOrNull(row.prop_new_chosen);
      const propOldNonselected = csvNumberOrNull(row.prop_old_nonchosen);
      const propNewNonselected = csvNumberOrNull(row.prop_new_nonchosen);

      row.prop_chosen =
        (propOldSelected !== null && propNewSelected !== null)
          ? propOldSelected + propNewSelected
          : '';

      row.prop_nonchosen =
        (propOldNonselected !== null && propNewNonselected !== null)
          ? propOldNonselected + propNewNonselected
          : '';

      const totalBlue = csvNumberOrNull(row.totalBlue);
      const totalRed = csvNumberOrNull(row.totalRed);
      const totalKnown = csvNumberOrNull(row.totalKnownCurrent);

      if (totalBlue !== null && totalRed !== null && totalKnown !== null && totalKnown > 0){
        row.known_margin_signed_blue = (totalBlue - totalRed) / totalKnown;
        row.known_margin_signed_red = (totalRed - totalBlue) / totalKnown;
        row.known_margin_abs = Math.abs(totalBlue - totalRed) / totalKnown;
      } else {
        row.known_margin_signed_blue = '';
        row.known_margin_signed_red = '';
        row.known_margin_abs = '';
      }

      const choice = row.choice;
      const selected = row.final_majority_color;
      const finalTotalBlue = csvNumberOrNull(row.finalTotalBlue);
      const finalTotalRed = csvNumberOrNull(row.finalTotalRed);
      const finalTotal =
        (finalTotalBlue !== null && finalTotalRed !== null)
          ? finalTotalBlue + finalTotalRed
          : null;

      if ((choice === 'blue' || choice === 'red') && finalTotal !== null && finalTotal > 0){
        row.choice_probability_correct =
          (choice === 'blue')
            ? finalTotalBlue / finalTotal
            : finalTotalRed / finalTotal;
      } else {
        row.choice_probability_correct = '';
      }

      if ((choice === 'blue' || choice === 'red') && (selected === 'blue' || selected === 'red')){
        row.choice_matches_final_majority = (choice === selected) ? 1 : 0;
      } else {
        row.choice_matches_final_majority = '';
      }

      const confidence = csvNumberOrNull(row.confidence);
      const prevConfidence = csvNumberOrNull(row.prevConfidence);
      row.confidence_change =
        (confidence !== null && prevConfidence !== null)
          ? confidence - prevConfidence
          : '';
    }

    const blockPairsBySubject = {};
    const trialPairsBySubjectTrial = {};

    for (const row of rows){
      const sheet = csvNumberOrNull(row.sheet);
      const propSelected = csvNumberOrNull(row.prop_chosen);
      const confidence = csvNumberOrNull(row.confidence);

      if (sheet === null || sheet < 2 || sheet > 9) continue;
      if (propSelected === null || confidence === null) continue;

      const subjectKey = String(row.subject);
      const trialKey = subjectKey + '|' + String(row.trialIndex);

      if (!blockPairsBySubject[subjectKey]) blockPairsBySubject[subjectKey] = [];
      blockPairsBySubject[subjectKey].push({ x: propSelected, y: confidence });

      if (includeTrialCalibration){
        if (!trialPairsBySubjectTrial[trialKey]) trialPairsBySubjectTrial[trialKey] = [];
        trialPairsBySubjectTrial[trialKey].push({ x: propSelected, y: confidence });
      }
    }

    const blockCorrBySubject = {};
    for (const subjectKey in blockPairsBySubject){
      const r = pearsonCorrelationFromPairs(blockPairsBySubject[subjectKey]);
      blockCorrBySubject[subjectKey] = (r === null) ? '' : r;
    }

    const trialCorrBySubjectTrial = {};
    if (includeTrialCalibration){
      for (const trialKey in trialPairsBySubjectTrial){
        const r = pearsonCorrelationFromPairs(trialPairsBySubjectTrial[trialKey]);
        trialCorrBySubjectTrial[trialKey] = (r === null) ? '' : r;
      }
    }

    for (const row of rows){
      const subjectKey = String(row.subject);
      const trialKey = subjectKey + '|' + String(row.trialIndex);

      row.metacognitive_calibration_block =
        Object.prototype.hasOwnProperty.call(blockCorrBySubject, subjectKey)
          ? blockCorrBySubject[subjectKey]
          : '';

      if (includeTrialCalibration){
        row.metacognitive_calibration_trial =
          Object.prototype.hasOwnProperty.call(trialCorrBySubjectTrial, trialKey)
            ? trialCorrBySubjectTrial[trialKey]
            : '';
      }
    }

    if (includeSwitchFields || includeSearchCommitFields){
      const rowsBySubjectTrial = {};

      for (const row of rows){
        const trialIndex = csvNumberOrNull(row.trialIndex);
        if (trialIndex === null) continue;

        // Include the task so combined-stream files never pool phase-1 and phase-2
        // rows that share a trial number.
        const key = String(row.subject) + '|' + String(row.task_name || '') + '|' + String(trialIndex);
        if (!rowsBySubjectTrial[key]) rowsBySubjectTrial[key] = [];
        rowsBySubjectTrial[key].push(row);
      }

      for (const key in rowsBySubjectTrial){
        const trialRows = rowsBySubjectTrial[key]
          .slice()
          .sort((a,b) => {
            const sheetA = csvNumberOrNull(a.sheet);
            const sheetB = csvNumberOrNull(b.sheet);
            return (sheetA === null ? 999 : sheetA) - (sheetB === null ? 999 : sheetB);
          });

        if (includeSwitchFields){
          let switchesSoFar = 0;

          for (const row of trialRows){
            const change = csvNumberOrNull(row.change_of_mind);
            if (change === 1) switchesSoFar += 1;
            row.num_switches_so_far = switchesSoFar;
          }

          const totalSwitches = switchesSoFar;
          for (const row of trialRows){
            row.total_switches_trial = totalSwitches;
          }
        }

        if (includeSearchCommitFields){
          const decisionRow = trialRows
            .slice()
            .reverse()
            .find(row => {
              const choice = row.choice;
              const confidence = csvNumberOrNull(row.confidence);
              return (choice === 'blue' || choice === 'red') && confidence !== null;
            });

          const commitMarginAbs = decisionRow ? csvNumberOrNull(decisionRow.known_margin_abs) : null;
          const commitChoice = decisionRow ? decisionRow.choice : null;
          const finalMajority = decisionRow ? decisionRow.final_majority_color : null;

          for (const row of trialRows){
            row.commit_margin_abs = (commitMarginAbs !== null) ? commitMarginAbs : '';

            if ((commitChoice === 'blue' || commitChoice === 'red') && (finalMajority === 'blue' || finalMajority === 'red')){
              row.commit_correct_final_majority = (commitChoice === finalMajority) ? 1 : 0;
            } else {
              row.commit_correct_final_majority = '';
            }
          }
        }
      }
    }

    if (includeFeedbackHistory){
      const feedbackByTrial = {};

      for (const row of rows){
        const trialIndex = csvNumberOrNull(row.trialIndex);
        const choice = row.choice;
        const selected = row.final_majority_color;
        const confidence = csvNumberOrNull(row.confidence);

        if (trialIndex === null) continue;

        const key = String(trialIndex);
        if (!feedbackByTrial[key]) {
          feedbackByTrial[key] = { correct: 0, total: 0, confidenceSum: 0, confidenceN: 0 };
        }

        if ((choice === 'blue' || choice === 'red') && (selected === 'blue' || selected === 'red')){
          feedbackByTrial[key].total += 1;
          if (choice === selected) feedbackByTrial[key].correct += 1;
        }

        if (confidence !== null){
          feedbackByTrial[key].confidenceSum += confidence;
          feedbackByTrial[key].confidenceN += 1;
        }
      }

      const sortedTrialIndices = Object.keys(feedbackByTrial)
        .map(x => Number(x))
        .filter(x => Number.isFinite(x))
        .sort((a,b) => a - b);

      const feedbackPropByTrial = {};
      const feedbackLabelByTrial = {};
      const meanConfidenceScaledByTrial = {};

      for (const trialIndex of sortedTrialIndices){
        const key = String(trialIndex);
        const fb = feedbackByTrial[key];

        if (fb && fb.total > 0){
          feedbackPropByTrial[key] = fb.correct / fb.total;

          if (fb.correct === fb.total) feedbackLabelByTrial[key] = 'always_right';
          else if (fb.correct === 0) feedbackLabelByTrial[key] = 'always_wrong';
          else if (fb.correct >= Math.ceil(fb.total / 2)) feedbackLabelByTrial[key] = 'mostly_right';
          else feedbackLabelByTrial[key] = 'mostly_wrong';
        } else {
          feedbackPropByTrial[key] = null;
          feedbackLabelByTrial[key] = '';
        }

        meanConfidenceScaledByTrial[key] =
          (fb && fb.confidenceN > 0)
            ? (fb.confidenceSum / fb.confidenceN) / 256
            : null;
      }

      const recentByTrial = {};
      const cumulativeByTrial = {};
      const previousLabelByTrial = {};
      const previousSurpriseByTrial = {};
      const previousFeedback = [];

      for (const trialIndex of sortedTrialIndices){
        const key = String(trialIndex);
        const prevKey = String(trialIndex - 1);

        if (previousFeedback.length > 0){
          recentByTrial[key] = previousFeedback[previousFeedback.length - 1];
          cumulativeByTrial[key] =
            previousFeedback.reduce((acc, val) => acc + val, 0) / previousFeedback.length;
        } else {
          recentByTrial[key] = '';
          cumulativeByTrial[key] = '';
        }

        if (Object.prototype.hasOwnProperty.call(feedbackLabelByTrial, prevKey)){
          previousLabelByTrial[key] = feedbackLabelByTrial[prevKey];
        } else {
          previousLabelByTrial[key] = '';
        }

        const prevFeedback = Object.prototype.hasOwnProperty.call(feedbackPropByTrial, prevKey)
          ? feedbackPropByTrial[prevKey]
          : null;
        const prevMeanConfidence = Object.prototype.hasOwnProperty.call(meanConfidenceScaledByTrial, prevKey)
          ? meanConfidenceScaledByTrial[prevKey]
          : null;

        previousSurpriseByTrial[key] =
          (prevFeedback !== null && prevMeanConfidence !== null)
            ? prevFeedback - prevMeanConfidence
            : '';

        const thisFeedback = feedbackPropByTrial[key];
        if (thisFeedback !== null && typeof thisFeedback !== 'undefined'){
          previousFeedback.push(thisFeedback);
        }
      }

      for (const row of rows){
        const trialIndex = csvNumberOrNull(row.trialIndex);
        const key = (trialIndex === null) ? null : String(trialIndex);

        row.recent_feedback =
          (key !== null && Object.prototype.hasOwnProperty.call(recentByTrial, key))
            ? recentByTrial[key]
            : '';

        row.cumulative_feedback =
          (key !== null && Object.prototype.hasOwnProperty.call(cumulativeByTrial, key))
            ? cumulativeByTrial[key]
            : '';

        if (includeFeedbackSurprise){
          row.previous_trial_feedback_label =
            (key !== null && Object.prototype.hasOwnProperty.call(previousLabelByTrial, key))
              ? previousLabelByTrial[key]
              : '';

          row.previous_trial_signed_feedback_surprise =
            (key !== null && Object.prototype.hasOwnProperty.call(previousSurpriseByTrial, key))
              ? previousSurpriseByTrial[key]
              : '';
        }
      }
    }

    return rows;
  }


  function calculateTrialTimeForExport(tr){
    if (!tr) return null;

    if (typeof tr.trialStartTime === 'number' && typeof tr.trialEndTime === 'number'){
      return tr.trialEndTime - tr.trialStartTime;
    }

    if (Array.isArray(tr.responses) && tr.responses.length > 0){
      const responses = tr.responses.filter(Boolean);
      const first = responses[0];
      const lastWithConfidence = responses
        .slice()
        .reverse()
        .find(r => r && r.confidence !== null && typeof r.confidence !== 'undefined');

      const start = first && typeof first.predictOnset === 'number'
        ? first.predictOnset
        : null;

      let end = null;

      if (lastWithConfidence){
        if (typeof lastWithConfidence.confOnset === 'number' && typeof lastWithConfidence.confRT === 'number'){
          end = lastWithConfidence.confOnset + lastWithConfidence.confRT;
        } else if (typeof lastWithConfidence.confRT === 'number'){
          end = lastWithConfidence.confRT;
        }
      }

      if (start !== null && end !== null && end >= start){
        return end - start;
      }
    }

    if (Array.isArray(tr.sheetRows) && tr.sheetRows.length > 0){
      const sheetRows = tr.sheetRows.filter(Boolean);
      const first = sheetRows[0];
      const lastWithConfidence = sheetRows
        .slice()
        .reverse()
        .find(r => r && r.confidence !== null && typeof r.confidence !== 'undefined');

      const start = first && typeof first.sheetOnset === 'number'
        ? first.sheetOnset
        : null;

      let end = null;

      if (lastWithConfidence && typeof lastWithConfidence.confRT === 'number'){
        end = lastWithConfidence.confRT;
      } else if (typeof tr.trialEnd === 'number'){
        end = tr.trialEnd;
      }

      if (start !== null && end !== null && end >= start){
        return end - start;
      }
    }

    if (typeof tr.trialStartTime === 'number' && typeof tr.trialEnd === 'number'){
      return tr.trialEnd - tr.trialStartTime;
    }

    return null;
  }

  function buildLongRowsFromOutObject(out) {
    const rows = [];
    const topMeta = Object.assign({
      subject: out.subject,
      prolific_pid: (typeof out.prolific_pid !== 'undefined' && out.prolific_pid !== null) ? out.prolific_pid : '',
      seed: out.seed,
      runsCount: out.runsCount,
      total_time: out.total_time,

let finalScoreSummaryShown = false;

function calculateMainTaskTotalScore(){

  let totalScore = 0;

  trialData.forEach(tr => {

    if (!tr || !Array.isArray(tr.responses)) return;

    tr.responses.forEach(r => {
      totalScore += (r.points || 0);
    });
  });

  return totalScore;
}

function showFinalScoreSummary(){

  clearResponseGate();

  const totalScore =
    calculateMainTaskTotalScore();

  taskArea.style.display = 'none';

  const endArea =
    document.getElementById('endArea');

  if (endArea){
    endArea.style.display = 'none';
  }

  let scoreArea =
    document.getElementById('finalScoreSummaryArea');

  if (!scoreArea){

    scoreArea = document.createElement('div');

    scoreArea.id = 'finalScoreSummaryArea';

    scoreArea.style.marginTop = '18px';
    scoreArea.style.minHeight = '520px';
    scoreArea.style.display = 'none';
    scoreArea.style.alignItems = 'center';
    scoreArea.style.justifyContent = 'center';
    scoreArea.style.textAlign = 'center';
    scoreArea.style.cursor = 'pointer';

    const center =
      document.querySelector('.center');

    if (center && endArea){
      center.insertBefore(scoreArea, endArea);
    } else if (center){
      center.appendChild(scoreArea);
    } else {
      document.body.appendChild(scoreArea);
    }
  }

  scoreArea.innerHTML = `
    <div style="font-size:32px; line-height:1.5; max-width:850px; margin:auto;">
      Thank you for completing the task.<br><br>
      Your final score was <strong>${totalScore} points</strong>.
      <br><br>
      <span style="font-size:22px;"><strong>CLICK to continue.</strong></span>
    </div>
  `;

  scoreArea.style.display = 'flex';

  scoreArea.onclick = (ev) => {

    ev.stopPropagation();

    scoreArea.style.display = 'none';

    finishExperiment();
  };
}

window.__surveyData = {};

function __pad2(n){ return String(n).padStart(2, '0'); }

function getSurveyCsvColumns(){
  const cols = [];
  for (const s of SURVEYS){
    for (let i = 1; i <= s.items.length; i++) cols.push(s.columnPrefix + __pad2(i));
  }
  for (const s of SURVEYS){
    cols.push(s.columnPrefix + 'duration_ms');
    cols.push(s.columnPrefix + 'skipped_ahead');
  }
  return cols;
}

function getSurveyCsvValues(){
  const vals = {};
  for (const c of getSurveyCsvColumns()){
    vals[c] = (typeof window.__surveyData[c] !== 'undefined' && window.__surveyData[c] !== null)
      ? window.__surveyData[c] : '';
  }
  return vals;
}

function __enabledSurveysInOrder(){
  return SURVEYS
    .map(function(s, idx){ return { s: s, idx: idx }; })
    .filter(function(e){ return !!e.s.enabled; })
    .sort(function(a, b){ return (a.s.order - b.s.order) || (a.idx - b.idx); })
    .map(function(e){ return e.s; });
}

<script>
/* ============================================================

   ------------------------------------------------------------
   Runs AFTER the experiment's own script. Wraps each fittable
   screen's content in a single .nf-fit element and scales that
   element down so the whole screen fits the viewport with no
   scrolling. Never upscales (no blur, large screens unchanged).
   Self-discovering: only acts on screens that exist in this file.
   ============================================================ */

  var ALL_IDS = ['manipCheckArea', 'instructions', 'instructionFlow', 'taskArea', 'endArea'];

  /* Exactly one screen should own the viewport. Some files (e.g. the feedback
     task) leave an EMPTY instruction panel displayed underneath the task; we
     pick a single primary by this priority and collapse any other leftover. */
  var PRIORITY = ['manipCheckArea', 'endArea', 'taskArea', 'instructionFlow', 'instructions'];

    if (!el) return false;
    var cs = getComputedStyle(el);
    if (cs.display === 'none' || cs.visibility === 'hidden') return false;
    if (el.offsetParent === null) {
      var r = el.getClientRects();
      if (!r || r.length === 0) return false;
    }
    return true;
  }

  /* The experiment toggles screens via inline style.display. We read THAT
     intent (not computed style) so our own collapse class never pollutes the
     decision and can't cause a show/hide feedback loop. An inline
     display:none means the experiment hid it; anything else means shown.

  function intendedVisible(el){
    return !!el && !(el.style && el.style.display === 'none');

     holds stays valid and all descendant CSS selectors keep matching. */
  function ensureWrapped(el){
    if (!el) return null;
    if (el.__nfFit) return el.__nfFit;
    var fit = document.createElement('div');
    fit.className = 'nf-fit';
    while (el.firstChild) fit.appendChild(el.firstChild);

    if (!fit) return;
