<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Prolific task</title>
<style>
  :root{
    --blue:#0000FF;
    --red:#EE0000;
    --bg:#ffffff;
    --muted:#666;
    --panel:#fafafa;
    --accent:#0078D4;
  }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 18px; color:#111; background:#fff; }
  .center { max-width: 980px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 6px; }
  p { line-height:1.45; }
  #instructions { border: 1px solid #ddd; padding: 14px; border-radius: 8px; background:var(--panel); }
  #canvasWrap { display:flex; justify-content:center; margin: 18px 0; position:relative; width:520px; height:520px; margin-left:auto; margin-right:auto; }
  .gridCanvas { position:absolute; left:0; top:0; width:520px; height:520px; background:var(--bg); border:1px solid #ccc; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
  .gridCanvas[aria-hidden="true"] { visibility:hidden; opacity:0; }
  .prompt { font-weight:600; margin-top:8px; text-align:center; } 
  .subtle { color:var(--muted); font-size:13px; }
  #controlsRow { display:flex; align-items:center; justify-content:center; gap:18px; margin-top:12px; }
  #tooSlowMsg {
    position:absolute;
    left:0;
    top:0;
    width:520px;
    height:520px;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:20;
    background:#fff;
    text-align:center;
    font-size:34px;
    font-weight:700;
    color:#111;
  }
  #cupOverlay { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:none; align-items:center; justify-content:center; pointer-events:auto; z-index:30; }
  #cupContainer { width:185px; height:400px; display:flex; align-items:center; justify-content:center; }
  #cupSVG { width:100%; height:100%; touch-action:none; user-select:none; outline:none; display:block; overflow:visible; }
  #startBtn, #copyDataBtn, #downloadCsvBtn { padding: 10px 14px; border-radius:6px; border: none; background:var(--accent); color:white; cursor:pointer; }
  #startBtn[disabled] { opacity:0.6; cursor:default; }
  #trialCounter { margin-top:8px; font-size:14px; text-align:center; }
  #message { margin: 12px 0; font-weight:600; text-align:center; }
  pre { white-space: pre-wrap; word-break: break-word; background:#f7f7f7; padding:10px; border-radius:6px; max-height:300px; overflow:auto; }

  .keyHint { display:inline-block; width:84px; padding:18px 0; text-align:center; border-radius:10px; margin:0 6px; font-weight:700; color:var(--bg); font-size:28px; line-height:1; }
  .keyA { background:var(--blue); }
  .keyD { background:var(--red); }

  #cupQuestion { text-align:center; font-weight:700; margin-bottom:8px; font-size:26px; }
  #cupLabel { text-align:center; font-size:13px; color:var(--muted); margin-top:6px; }

  #trialEndOverlay {
    position:absolute;
    left:0;
    top:0;
    width:520px;
    height:520px;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:40;
    background:transparent;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
  }
  #trialEndOverlay .text {
    font-weight:700;
    font-size:32px;
    color:#111;
  }

  @media (max-width:720px){
    #canvasWrap { width:360px; height:360px; }
    .gridCanvas { width:360px; height:360px; }
    #cupContainer { width:128px; height:280px; }
    #trialEndOverlay { width:360px; height:360px; } #tooSlowMsg { width:360px; height:360px; font-size:28px; }
    #trialEndOverlay .text { font-size:28px; }
    #cupQuestion { font-size:20px; }
    .keyHint { width:58px; padding:12px 0; text-align:center; font-size:20px; border-radius:8px; }
  }

  .instructionBlue{
    color:var(--blue);
    font-weight:700;
  }

  .instructionRed{
    color:var(--red);
    font-weight:700;
  }

  .lockedInstruction{
    cursor:not-allowed;
  }

  .instructionGridWrap{
    display:flex;
    justify-content:center;
    margin-top:20px;
  }

  /* Readability fix: cap instruction text width and center it so lines wrap at a
     comfortable reading width instead of running the full screen on large
     displays (mirrors the searchtermination instruction layout). The small/
     short-screen overrides in the media queries below still take precedence. */
  #instructionContent > div{
    max-width:820px;
    margin-left:auto;
    margin-right:auto;
  }

  .practiceOverlay{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:700;
    background:rgba(0,0,0,0.85);
    color:white;
    z-index:999;
  }


/* =========================
   RESPONSIVE TASK-PHASE PATCH
   Rebuild approach: keep the original desktop instruction layout intact.
   Only the task phase is scaled by default; instruction screens scale only
   on genuinely constrained viewports.
========================= */
:root{
  --task-grid-size: min(520px, 92vw, calc(100vh - 220px));
  --task-cup-width: min(185px, calc(var(--task-grid-size) * 0.36));
  --task-cup-height: min(400px, calc(var(--task-grid-size) * 0.77));
}

html,
body{
  max-width:100%;
  overflow-x:hidden;
}

#taskArea[style*="display: block"],
#taskArea[style*="display:block"]{
  display:flex !important;
  flex-direction:column !important;
  align-items:center !important;
  justify-content:flex-start !important;
  box-sizing:border-box !important;
  max-height:calc(100vh - 10px) !important;
  overflow:hidden !important;
  margin-top:0 !important;
}

#taskArea #trialCounter{
  flex:0 0 auto !important;
  margin-top:0 !important;
  margin-bottom:clamp(2px, 0.6vh, 8px) !important;
  font-size:clamp(12px, 1.7vmin, 14px) !important;
  line-height:1.2 !important;
}

#taskArea #pointsDisplay{
  flex:0 0 auto !important;
  margin:clamp(3px, 0.8vh, 10px) 0 !important;
}

#taskArea #pointsDisplay > div:first-child{
  font-size:clamp(15px, 2.5vmin, 24px) !important;
  line-height:1.25 !important;
  margin-bottom:clamp(4px, 0.7vh, 8px) !important;
}

#taskArea #pointsBarContainer{
  width:clamp(150px, 34vw, 220px) !important;
  height:clamp(14px, 2.2vmin, 22px) !important;
}

#taskArea #canvasWrap{
  width:var(--task-grid-size) !important;
  height:var(--task-grid-size) !important;
  flex:0 0 var(--task-grid-size) !important;
  margin:clamp(5px, 1vh, 18px) auto !important;
}

#taskArea .gridCanvas,
#taskArea #trialEndOverlay{
  width:100% !important;
  height:100% !important;
}

#taskArea #trialEndOverlay .text{
  font-size:clamp(18px, calc(var(--task-grid-size) * 0.055), 32px) !important;
  line-height:1.3 !important;
}

#taskArea #cupContainer{
  width:var(--task-cup-width) !important;
  height:var(--task-cup-height) !important;
}

#taskArea #cupQuestion{
  font-size:clamp(17px, calc(var(--task-grid-size) * 0.05), 26px) !important;
  line-height:1.2 !important;
  margin-bottom:clamp(4px, 0.8vh, 8px) !important;
}

#taskArea #cupLabel{
  font-size:clamp(11.7px, calc(var(--task-grid-size) * 0.02808), 15.21px) !important;
  line-height:1.2 !important;
  margin-top:clamp(3px, 0.6vh, 6px) !important;
}

#taskArea .prompt{
  flex:0 0 auto !important;
  max-width:min(94vw, 900px) !important;
  margin-top:clamp(3px, 0.7vh, 8px) !important;
  font-size:clamp(14px, 1.9vmin, 17px) !important;
  line-height:1.25 !important;
}

#taskArea #controlsRow{
  flex:0 0 auto !important;
  margin-top:clamp(5px, 1vh, 12px) !important;
  gap:clamp(8px, 1.4vmin, 18px) !important;
}

#taskArea .keyHint{
  width:clamp(56px, 10.3vmin, 84px) !important;
  padding:clamp(10px, 2.1vmin, 18px) 0 !important;
  text-align:center !important;
  font-size:clamp(20px, 4.2vmin, 28px) !important;
  border-radius:clamp(8px, 1.8vmin, 10px) !important;
}

#taskArea #message{
  flex:0 0 auto !important;
  margin:clamp(4px, 0.8vh, 12px) 0 !important;
  line-height:1.2 !important;
}

@media (max-height:720px){
  :root{
    --task-grid-size: min(520px, 90vw, calc(100vh - 190px));
  }
}

@media (max-height:600px){
  :root{
    --task-grid-size: min(520px, 88vw, calc(100vh - 165px));
  }
}

/* Instruction fallback: desktop remains like the original files. These rules
   only activate on small or short screens, and keep example grids square. */
@media (max-width:720px), (max-height:680px){
  .instructionGridWrap{
    margin-top:clamp(8px, 1.3vh, 20px) !important;
  }

  #instructionCanvas,
  #instructionContent canvas,
  .instructionSlide canvas,
  canvas[id^="exampleCanvas"]{
    width:min(420px, 82vw, 42vh) !important;
    height:auto !important;
    aspect-ratio:1 / 1 !important;
    max-width:82vw !important;
    max-height:42vh !important;
    display:block !important;
    box-sizing:border-box !important;
  }

  .instructionSlide p{
    font-size:clamp(16px, 3.7vw, 24px) !important;
    line-height:1.42 !important;
    margin:0.42em auto !important;
  }

  .instructionSlide h2{
    font-size:clamp(22px, 5vw, 32px) !important;
    line-height:1.25 !important;
  }

  #instructionContent > div{
    max-width:94vw !important;
  }
}

@media (max-height:560px){
  #instructionCanvas,
  #instructionContent canvas,
  .instructionSlide canvas,
  canvas[id^="exampleCanvas"]{
    width:min(330px, 76vw, 34vh) !important;
    max-height:34vh !important;
  }

  .instructionSlide p{
    font-size:clamp(13px, 3.4vw, 18px) !important;
    line-height:1.32 !important;
    margin:0.28em auto !important;
  }
}


/* ============================================================
   NO-SCROLL MULTI-SCREEN AUTO-FIT  (added for Prolific launch)
   ------------------------------------------------------------
   Guarantees every instruction screen and every task stimulus is
   fully visible WITHOUT scrolling on any desktop/laptop viewport.
   The page is locked to the viewport height; the single active
   screen is scaled DOWN to fit when (and only when) its content
   would otherwise overflow. Content is never scaled up, so large
   screens look identical to the original and nothing ever blurs.
   This layer sits on top of the existing responsive task patch and
   never fights it: the patch caps element sizes at their desktop
   maximums, and this layer only shrinks further if needed.
   The final data/results screen (#endArea) is deliberately allowed
   to scroll internally - it is neither an instruction nor a stimulus.
   ============================================================ */
html, body{
  height:100%;
  margin:0 !important;
  overflow:hidden !important;          /* the page itself never scrolls */
}
body{ box-sizing:border-box; }

.center{
  max-width:none !important;           /* inner blocks keep their own max-width */
  width:100%;
  margin:0 !important;
  height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  box-sizing:border-box;
  padding:6px 12px 10px;
  overflow:hidden;
}
.center > h1{
  flex:0 0 auto;
  margin:2px 0 6px !important;
  text-align:center;
  line-height:1.15;
}

/* Every known screen is a stage; only the visible one becomes active. */
.nf-stage{
  width:100%;
  box-sizing:border-box;
}
.nf-stage.nf-active{
  flex:1 1 auto !important;
  min-height:0 !important;
  position:relative !important;
  overflow:hidden !important;
  display:flex !important;
  flex-direction:column !important;
  align-items:center !important;
  justify-content:center !important;
}
/* The final data/results screen may scroll internally if it is long. */
#endArea.nf-active{
  overflow:auto !important;
  justify-content:flex-start !important;
}

/* A screen the experiment left displayed but that is not the active one
   (e.g. the now-empty instruction panel sitting under the task) is hidden so
   it never steals a slice of the viewport above the task stimuli. */
.nf-collapsed{
  display:none !important;
}

/* Wrapper injected around each fit-screen's content; this is what we scale. */
.nf-fit{
  flex:0 0 auto;
  width:100%;
  box-sizing:border-box;
  transform-origin:center center;
  will-change:transform;
}

/* ------------------------------------------------------------
   TASK-PHASE FIT
   The existing responsive task patch already shrinks the grid via
   viewport math. Combined with this layer's scaling that produced a
   double-shrink (tiny grid) and pushed the A/D keys off-screen.
   Fix: pin the task column to its natural desktop size and let the
   auto-fit layer be the SINGLE source of scaling - one uniform
   scale of the whole column (grid + prompt + A/D keys + message),
   anchored to the top so the grid sits directly under the heading
   and the A/D keys always stay on screen. Pure layout; the task
   drawing and interaction code is untouched.
   ------------------------------------------------------------ */
:root{
  --task-grid-size: min(520px, 94vw) !important;   /* fixed 520px grid, but never wider than the viewport so it always stays horizontally centred in small windows; the auto-fit still scales for height */
}
#taskArea.nf-active{
  max-height:none !important;           /* let the flex height own it, not a vh cap */
  margin-top:0 !important;
  justify-content:flex-start !important;
}
#taskArea > .nf-fit{
  display:flex !important;
  flex-direction:column !important;
  align-items:center !important;
  justify-content:flex-start !important;
  transform-origin:top center;          /* scale toward the top: nothing clips off the bottom */
}

/* ------------------------------------------------------------
   STABLE TRIAL HEIGHT
   The trial reveals the A/D keys (#controlsRow) ~150ms after the
   grid appears, and toggles the prompt between the prediction and
   confidence phases. Each toggle changed the column height and made
   the auto-fit re-scale, so the grid visibly shrank mid-trial.
   Fix: while these elements are hidden, RESERVE their space (keep the
   layout box, just make them invisible) instead of collapsing them.
   The column height is then constant for the whole trial, so the grid
   is sized once for the final (keys-visible) layout and never resizes.
   The keys remain invisible and non-interactive during the delay.
   ------------------------------------------------------------ */
#taskArea #controlsRow[style*="display: none"],
#taskArea #controlsRow[style*="display:none"]{
  display:flex !important;
  visibility:hidden !important;
}
#taskArea .prompt[style*="display: none"],
#taskArea .prompt[style*="display:none"]{
  display:block !important;
  visibility:hidden !important;
}


/* ============================================================
   MANIPULATION CHECK (added) - styles for the pre-trial goal
   comprehension check and its correction screen. Scaled to fit
   by the existing no-scroll auto-fit layer (manipCheckArea is a
   registered stage), so it never scrolls on any screen.
   ============================================================ */
#manipCheckArea{ width:100%; box-sizing:border-box; }
.manipWrap{
  width:100%; max-width:780px; margin:0 auto; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:22px; padding:10px;
}
.manipQ{ font-size:26px; font-weight:700; line-height:1.3; }
.manipOpts{ display:flex; flex-direction:column; gap:14px; width:100%; align-items:center; }
.manipOpt{
  display:flex; align-items:flex-start; gap:12px; text-align:left;
  width:100%; max-width:700px;
  font-size:20px; line-height:1.35; padding:16px 18px;
  border:2px solid #333; border-radius:10px; background:#fff; color:#111;
  cursor:pointer; font-family:inherit;
}
.manipOpt:hover{ background:#eef3ff; border-color:#2b6cff; }
.manipKey{ font-weight:800; }
.manipText{ flex:1; }
.manipCorrection{ display:flex; flex-direction:column; gap:14px; align-items:center; }
.manipCorrTitle{ font-size:26px; font-weight:800; color:#b00020; }
.manipCorrBody{ font-size:22px; line-height:1.35; }
.manipCorrAnswer{ font-size:22px; font-weight:700; max-width:700px; line-height:1.4; }
.manipContinue{
  font-size:22px; font-weight:700; padding:14px 34px; border:2px solid #111;
  border-radius:10px; background:#111; color:#fff; cursor:pointer; font-family:inherit;
}
.manipContinue:hover{ background:#333; }
.manipCorrect{ display:flex; flex-direction:column; gap:14px; align-items:center; }
.manipCorrectTitle{ font-size:28px; font-weight:800; color:#1a9c41; }
.manipCorrectBody{ font-size:23px; line-height:1.4; max-width:700px; }
.manipBegin{ font-size:22px; font-weight:700; padding:14px 34px; border:2px solid #111; border-radius:10px; background:#111; color:#fff; cursor:pointer; font-family:inherit; }
.manipBegin:hover{ background:#333; }


/* =========================================================================
   v1-16 CHANGE 1 — vertically centre the task-phase screens.
   The auto-fit layer above anchored #taskArea's column to the top so the
   A/D keys never clipped off the bottom while scaling. The enclosing
   .nf-stage.nf-active is already a centring flex column, so we simply let
   #taskArea and its .nf-fit wrapper centre too: with vertical slack the
   column sits in the middle (matching the instruction screens), and when
   it must shrink to fit it scales about its centre, which cannot clip
   because the stage centres and clips symmetrically.
   ========================================================================= */
#taskArea.nf-active{
  justify-content:center !important;
}
#taskArea > .nf-fit{
  justify-content:center !important;
  transform-origin:center center !important;
}

/* v1-16 CHANGE 2 — the "Too slow!" and trial-end overlays must fill the
   (responsively sized) #canvasWrap rather than keep a fixed pixel width, or
   their centred contents overflow to the left once the wrap is smaller than
   that fixed width in a small window. */
#canvasWrap #tooSlowMsg,
#canvasWrap #trialEndOverlay{
  width:100% !important;
  height:100% !important;
  left:0 !important;
  top:0 !important;
}

</style>
<style>
/* v1-40: not-allowed cursor whenever the participant is blocked from advancing
   (grid-hide below takes priority so the grid is never obscured by a cursor). */
body.blockedCursor, body.blockedCursor * { cursor: not-allowed !important; }
/* v1-21: cursor hidden while the trial grid is visible */
body.gridCursorHide, body.gridCursorHide * { cursor: none !important; }
#fsReturnOverlay, #fsReturnOverlay * { cursor: auto !important; }
#fsReturnOverlay #fsReturnBtn { cursor: pointer !important; }
</style>
</head>
<body>
<div class="center">

  <div id="instructions" style="display:none;">
    <button id="startBtn" type="button" style="display:none;">Start experiment</button>
    <span id="Akey" style="display:none;">A</span>
    <span id="Dkey" style="display:none;">D</span>
    <div id="debugLog" style="display:none;"></div>
  </div>

<div id="instructionFlow" style="display:none; margin-top:18px;">

  <div id="instructionCard"
       style="
         border:none;
         border-radius:10px;
         padding:28px;
         min-height:420px;
         background:#ffffff;
         position:relative;
         text-align:center;
       ">

    <div id="instructionContent"></div>

    <div id="instructionContinue"
         style="
           position:absolute;
           bottom:-24px;
           width:100%;
           left:0;
           font-size:28px;
           line-height:1.5;
           font-weight:700;
           opacity:0;
           pointer-events:none;
         ">
      CLICK to continue
    </div>

  </div>
</div>


  <div id="taskArea" style="display:none; margin-top:18px;">
    <div id="trialCounter">Trial 1 / 32</div>

    <div id="canvasWrap" aria-live="polite">
      <canvas id="bottomCanvas" class="gridCanvas" width="520" height="520" aria-hidden="false"></canvas>
      <canvas id="topCanvas" class="gridCanvas" width="520" height="520" aria-hidden="true" style="opacity:0; transition: opacity 300ms ease;"></canvas>

      <div id="tooSlowMsg" aria-hidden="true">Too slow!</div>

      <div id="trialEndOverlay" aria-hidden="true">
        <div class="text" id="trialEndText"></div>
      </div>

      <div id="cupOverlay" aria-hidden="true">
        <div id="cupContainer" role="application" aria-label="Confidence cup">
          <div style="width:100%; max-width:185px;">
            <div id="cupQuestion" aria-live="polite"></div>
            <svg id="cupSVG" viewBox="0 0 120 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Confidence cup" tabindex="0">
              <defs>
                <linearGradient id="cupGrad" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="#d1d1d1"/>
                  <stop offset="100%" stop-color="#d1d1d1"/>
                </linearGradient>
              </defs>
              <g id="cupGroup">
                <path id="cupOutline" d="M20 20 L100 20 L100 220 Q60 220 20 220 Z" fill="#fff" stroke="#bbb" stroke-width="2"/>
                <clipPath id="cupClip">
                  <path d="M22 22 L98 22 L98 218 Q60 218 22 218 Z"/>
                </clipPath>
                <rect id="liquid" x="22" y="22" width="76" height="196" fill="url(#cupGrad)" clip-path="url(#cupClip)"/>
                <g id="beakerLines" stroke="#999" stroke-width="1"></g>
                <circle id="handle" cx="60" cy="120" r="20.25" fill="#444" stroke="#222" stroke-width="3" style="cursor:ns-resize"/>
              </g>
            </svg>
            <div id="cupLabel" class="subtle"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="prompt" id="predictPrompt">Which colour ball is inside the selected box?</div>

    <div id="controlsRow">
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div style="margin-bottom:8px;">
          <span id="AkeyLabel" class="keyHint keyA">A</span>
          <span style="margin-left:8px; margin-right:8px;" class="subtle">or</span>
          <span id="DkeyLabel" class="keyHint keyD">D</span>
        </div>
      </div>
    </div>

    <!-- v1-16: fixed dummy space below the response buttons so the task column
         matches search-termination's height (which has an extra prompt line
         under the grid). Keeps the grid and confidence scale at the same
         centred screen position across all three tasks. -->
    <div id="belowButtonsSpacer" aria-hidden="true" style="flex:0 0 auto; height:43px;"></div>

    <div id="message" class="fade"></div>

function __constrainedGoalOrder(OPTIONS){
  // Constrained randomisation of the 4 goal-check options.
  //   #1 single_open, #2 single_full, #3 more_open, #4 more_full
  // Rules: {1,2} stay adjacent and {3,4} stay adjacent (one pair in a/b, the other in c/d);
  //   a single "ignore-first" bit sets within-pair order for BOTH pairs (so 1<2 iff 3<4).
  function byId(id){ for (var i=0;i<OPTIONS.length;i++){ if (OPTIONS[i].id===id) return OPTIONS[i]; } return null; }
  var o1=byId('single_open'), o2=byId('single_full'), o3=byId('more_open'), o4=byId('more_full');
  if(!o1||!o2||!o3||!o4){ var a=OPTIONS.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  var ignoreFirst = (Math.random() < 0.5);   // #1 before #2 (and #3 before #4) when true
  var selPairTop  = (Math.random() < 0.5);   // {1,2} occupy a/b when true, else c/d
  var pair12 = ignoreFirst ? [o1,o2] : [o2,o1];
  var pair34 = ignoreFirst ? [o3,o4] : [o4,o3];
  return selPairTop ? pair12.concat(pair34) : pair34.concat(pair12);
}

function __goalLayoutCode(order){

  // Generate runs. RNG consumption order per run is IDENTICAL to the seed-search
  // model: [bimodal mode draw if probabilistic] -> start_p gauss -> walk_sd ->
  // walk gauss x numGroups -> full-grid shuffle (total-1) -> per-revealed-box
  // assignment (in reveal order) -> 1 selection draw. This guarantees a searched
  // seed reproduces here exactly, for canonical AND advanced settings.
  function generate_runs(seed, runsCount) {
    const rnd = mulberry32(seed);
    const cfg = STIM_CONFIG, SCH = SCHEDULE, numGroups = SCH.numGroups;
    const runs = [];
    for (let runIdx = 0; runIdx < runsCount; runIdx++) {
      // bimodal start-p: choose the mode. Probabilistic consumes one draw; determined consumes none.
      let pm = cfg.pMean, ps = cfg.pStd;
      if (cfg.genAdvanced && cfg.bmEnable) {
        let mode;
        if (cfg.bmAssign === 'probabilistic') { mode = (rnd() < cfg.bmProb) ? 1 : 2; }
        else { mode = (runIdx < cfg.bmN1) ? 1 : 2; }
        if (mode === 1) { pm = cfg.bmMean1; ps = cfg.bmSd1; } else { pm = cfg.bmMean2; ps = cfg.bmSd2; }

      const start_p = truncated_gauss_val(rnd, pm, ps, cfg.pLo, cfg.pHi);
      const walk_sd = cfg.walkSdLo + rnd() * (cfg.walkSdHi - cfg.walkSdLo);
      const p_vals = [start_p];
      let p = start_p, step = 0;
      const wmode = cfg.genAdvanced ? cfg.walkMode : 'pure';
      for (let s = 1; s <= numGroups; s++) {
        const gz = gauss(rnd), sdS = walk_sd * phaseMult(cfg, s, numGroups);

        else { p = p + gz * sdS; }

      for (let r = 1; r <= cfg.rows; r++) for (let c = 1; c <= cfg.cols; c++) cells.push({ r, c });

      const groups = []; { let off = 0; for (let g = 0; g < numGroups; g++) { groups.push(cells.slice(off, off + SCH.groupSizes[g])); off += SCH.groupSizes[g]; } }

      // assignment and sheetTotals (one Bernoulli per revealed box, in reveal order)
      const assignment = {};
      const cumulative_blue_fracs = [];
      const sheetTotals = []; // index 0..SHEETS-1 for sheets 1..SHEETS
      for (let sheetIdx = 0; sheetIdx < SHEETS; sheetIdx++){
        if (sheetIdx === 0){
          cumulative_blue_fracs.push(0.0);

          const redCount = introduced.length - blueCount;
          cumulative_blue_fracs.push(introduced.length ? blueCount / introduced.length : 0);
          sheetTotals.push({ totalBlue: blueCount, totalRed: redCount });

      // run-level crossings (majority changes across sheets 3..SHEETS, excluding ties)
      let run_crossings = 0;
      for (let curIdx = 2; curIdx < SHEETS; curIdx++) {
        const prevIdx = curIdx - 1;
        const prev = sheetTotals[prevIdx];
        const cur = sheetTotals[curIdx];
        if (!prev || !cur) continue;
        if (prev.totalBlue === prev.totalRed) continue;
        if (cur.totalBlue === cur.totalRed) continue;
        const prevMajor = (prev.totalBlue > prev.totalRed) ? 'blue' : 'red';
        const curMajor = (cur.totalBlue > cur.totalRed) ? 'blue' : 'red';
        if (prevMajor !== curMajor) run_crossings++;
      }

      const final_p = p_vals[SHEETS - 1];
      const finalTotals = sheetTotals[SHEETS - 1];
      const blueProb = finalTotals.totalBlue / (finalTotals.totalBlue + finalTotals.totalRed);
      // Consume the seed-search selection draw so the seeded RNG stream stays aligned
      // (the searched blue/red proportions depend on stream position), but make the
      // actual selection with Math.random() so every participant gets an independent draw.
      rnd();
      const selected_color = (Math.random() < blueProb) ? 'blue' : 'red';

      runs.push({
        runIndex: runIdx + 1,
        start_p,
        walk_sd,
        p_vals,
        groups,
        assignment,
        cumulative_blue_fracs,
        sheetTotals,            // totals per sheet
        crossings: run_crossings, // run-level crossings (same for all sheets of this run)
        final_p,
        selected_color
      });
    }
    return runs;

  const blueProb =
    finalTotals.totalBlue /
    (finalTotals.totalBlue + finalTotals.totalRed);

  // Independent participant-level selection draw (the seeded stream is not used here).
  r.selected_color = (Math.random() < blueProb) ? 'blue' : 'red';

  r.swapped = true;

  return r;
});


// Combine original + swapped
let runs = [...baseRuns, ...swappedRuns];

// Give each of the 32 seeded runs a stable unique ID before shuffling.
// trialIndex will reflect presentation order; runIndex will reflect stimulus identity.
runs.forEach((r, i) => {
  r.runIndex = i + 1;
});

console.log("Total runs:", runs.length);

// Randomise presentation order separately for each participant using a
// subject-seeded Fisher-Yates shuffle. This preserves the same 32 seeded
// trials overall, while varying only their order across participants.
for (let i = runs.length - 1; i > 0; i--) {
  const j = Math.floor(participantRnd() * (i + 1));
  [runs[i], runs[j]] = [runs[j], runs[i]];
}

/* ===== PER-PARTICIPANT BALL-LOCATION RANDOMISATION (added) =====
   Keeps every per-sheet blue/red proportion EXACTLY as the mulberry32
   seed determines it (reveal-order colour sequence and group sizes are
   untouched). Only GRID POSITIONS are re-mapped via the participant RNG.
   Each swapped twin ALSO receives its OWN independent randomised layout
   (same scheme, from the participant RNG), so all 32 trials have unique
   ball locations; twin per-sheet colour counts stay seed-exact. Drawn AFTER the order
   shuffle and keyMapping so run order / key mapping are unchanged. */
(function(){
  function __shuffledPositions(prng){
    var positions=[];
    for (var r=1;r<=GRID_ROWS;r++) for (var c=1;c<=GRID_COLS;c++) positions.push({r:r,c:c});
    for (var i=positions.length-1;i>0;i--){
      var j=Math.floor(prng()*(i+1));
      var t=positions[i]; positions[i]=positions[j]; positions[j]=t;
    }
    return positions;
  }
  function __remapRunLocations(run, newPositions){
    var order=[];
    for (var g=0; g<run.groups.length; g++){
      for (var k=0;k<run.groups[g].length;k++) order.push(run.groups[g][k]);
    }
    var seqColors = order.map(function(cell){ return run.assignment[cell.r+'-'+cell.c]; });
    var newGroups=[]; var idx=0;
    for (var g2=0; g2<run.groups.length; g2++){
      var size=run.groups[g2].length;
      newGroups.push(newPositions.slice(idx, idx+size).map(function(c){ return {r:c.r,c:c.c}; }));
      idx+=size;
    }
    var newAssignment={}; var n=0;
    for (var g3=0; g3<newGroups.length; g3++){
      for (var m=0;m<newGroups[g3].length;m++){
        var cell=newGroups[g3][m];
        newAssignment[cell.r+'-'+cell.c]=seqColors[n++];
      }
    }
    run.groups=newGroups;
    run.assignment=newAssignment;
  }
  function __rot(cell){ return { r: (GRID_ROWS+1)-cell.r, c: (GRID_COLS+1)-cell.c }; }
  function __flip(color){ return (color==='blue') ? 'red' : ((color==='red') ? 'blue' : color); }
  function __deriveRotatedTwin(twin, base){
    var newGroups=[]; var newAssignment={};
    for (var g=0; g<base.groups.length; g++){
      var grp=[];
      for (var k=0; k<base.groups[g].length; k++){
        var bcell=base.groups[g][k];
        var tcell=__rot(bcell);
        grp.push({r:tcell.r, c:tcell.c});
        newAssignment[tcell.r+'-'+tcell.c]=__flip(base.assignment[bcell.r+'-'+bcell.c]);
      }
      newGroups.push(grp);
    }
    twin.groups=newGroups;
    twin.assignment=newAssignment;
  }
  try {
    for (var i=0; i<baseRuns.length; i++){
      var pos = __shuffledPositions(participantRnd);
      __remapRunLocations(baseRuns[i], pos);
      if (swappedRuns[i]) { __remapRunLocations(swappedRuns[i], __shuffledPositions(participantRnd)); }
    }
  } catch(e){ console.error('ball-location randomisation failed', e); }
})();

return runs;
}

/* ==== v1-21: fullscreen requirement + prompt counter ==== */

(function(){
  function isFs(){
    try { if (document.fullscreenElement) return true; } catch(e){}
    try { if (window.parent && window.parent !== window && window.parent.document && window.parent.document.fullscreenElement) return true; } catch(e){}
    return false;
  }
  function requestFs(){
    try {
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (req){ var p = req.call(el); if (p && typeof p.catch === 'function') p.catch(function(){}); }
    } catch(e){}
  }
  var armed = false, ov = null;
  function showPrompt(){
    if (ov) return;

      '<button id="fsReturnBtn" type="button" style="height:76px; padding:0 36px; background:#000; color:#fff; border:3px solid #000; border-radius:10px; font-size:26px; font-weight:800; letter-spacing:1px; cursor:pointer;">Enter full screen mode</button>' +
      '<div style="font-size:16px; line-height:1.4; color:#666; max-width:760px; margin-top:22px;">If nothing happens, please click the button again.</div>';
    document.body.appendChild(ov);
  }
  function hidePrompt(){
    if (ov){ ov.remove(); ov = null; }
  }
  function onChange(){
    if (isFs()){ armed = true; hidePrompt(); }
    else if (armed){ showPrompt(); }
  }
  /* v1-45: own the return-to-fullscreen button at the very start of the capture
     phase. Registered at load, before any screen installs its own listeners, so
     no later capture-phase handler (e.g. a manip-check "click anywhere" screen)
     can call stopImmediatePropagation and swallow the click before the button
     acts. While the prompt is up, a click on the button re-requests fullscreen
     and any other click is swallowed so the task underneath cannot receive it.
     There is no auto-dismiss: the prompt stays until fullscreen is actually
     restored (onChange removes it), so a participant who has been in fullscreen
     must return to it in order to continue. */
  document.addEventListener('click', function(ev){
    if (!ov) return;
    var tgt = ev.target;
    var onBtn = tgt && ((tgt.id === 'fsReturnBtn') || (tgt.closest && tgt.closest('#fsReturnBtn')));
    if (onBtn){ requestFs(); }
    ev.stopImmediatePropagation(); ev.preventDefault();
  }, true);
  /* swallow all keys while the return-to-fullscreen prompt is up */
  document.addEventListener('keydown', function(ev){
    if (ov){ ev.stopImmediatePropagation(); ev.preventDefault(); }
  }, true);
  try { document.addEventListener('fullscreenchange', onChange); } catch(e){}
  try {
    if (window.parent && window.parent !== window && window.parent.document){
      window.parent.document.addEventListener('fullscreenchange', onChange);
    }
  } catch(e){}
  setTimeout(function(){ if (isFs()) armed = true; }, 300);
})();

  const crossingCounts = runs.map(r=>r.crossings);

  //   EXAMPLE 1 opens a balanced half (64/64 = 50/50),
  //   EXAMPLE 2 opens a blue-skewed half (96/32 = 75/25),
  //   EXAMPLE 3 opens EXAMPLE 2's exact complement (32/96 = 25/75, forced by the 128/128 whole).
  let __exGrids = null;
  function __shufDet(arr, seed){
    const a = arr.slice();
    const rnd = () => { seed = (seed*1664525 + 1013904223) >>> 0; return seed/4294967296; };
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }
  function buildExampleGrids(){

    const H2 = [];  // demo groups 4-7 (the other half)
    for(let g=4;g<=7;g++){ (demoRun.groups[g] || []).forEach(c => H2.push(c)); }
    const assign = {};
    // H1 coloured exactly as EXAMPLE 1 was before (seed 987654321, first 64 -> blue): EX1 stays unchanged.
    __shufDet(H1, 987654321).forEach((c,i) => { assign[c.r+'-'+c.c] = (i<64)?'blue':'red'; });
    // H2 coloured 64/64 so the FULL grid is exactly 128 blue / 128 red.
    __shufDet(H2, 192837465).forEach((c,i) => { assign[c.r+'-'+c.c] = (i<64)?'blue':'red'; });
    const all  = H1.concat(H2);
    const blue = all.filter(c => assign[c.r+'-'+c.c]==='blue');  // 128 blue cells
    const red  = all.filter(c => assign[c.r+'-'+c.c]==='red');   // 128 red cells
    // EXAMPLE 2 open set = 96 blue + 32 red cells drawn from the same fixed grid.
    const O2 = __shufDet(blue,55555).slice(0,96).concat(__shufDet(red,77777).slice(0,32));
    const O2set = {}; O2.forEach(c => O2set[c.r+'-'+c.c] = true);
    const O1set = {}; H1.forEach(c => O1set[c.r+'-'+c.c] = true);   // EXAMPLE 1 = groups 0-3
    // EXAMPLE 3 = the opposite half of boxes to EXAMPLE 2 (its exact complement) -> 32 blue / 96 red.
    const O3set = {}; all.forEach(c => { if(!O2set[c.r+'-'+c.c]) O3set[c.r+'-'+c.c] = true; });
    return { assign, O1set, O2set, O3set };
  }
  function drawExampleGrid(which){   // which = 1 | 2 | 3

    const openSet = which===1 ? __exGrids.O1set : (which===2 ? __exGrids.O2set : __exGrids.O3set);

      }

async function animateCase8Selection(stepMs){

  const c = document.getElementById('instructionCanvas');

  if(!c) return;

  const ctx = c.getContext('2d');

  const state = { curSheet: 0, running: true };

  // One open/close cycle: 0->8 (open), 8->1 (close), then settle closed.
  const seq = [];
  for(let sIdx=0; sIdx<=8; sIdx++) seq.push(sIdx);
  for(let sIdx=7; sIdx>=1; sIdx--) seq.push(sIdx);
  seq.push(0);

  // Stepper: stepMs between each opening / closing step.
  const stepper = (async () => {
    for(const sh of seq){
      state.curSheet = sh;
      await new Promise(r=>setTimeout(r,stepMs));
    }
    state.running = false;
  })();

  // Continuous random-selection scan: 5ms per box outline, over whatever sheet is currently shown.
  const scanner = (async () => {
    while(state.running){
      const cells = [];
      for(let r=1;r<=16;r++){
        for(let col=1;col<=16;col++){
          cells.push({r,col});
        }
      }
      for(let i=cells.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [cells[i],cells[j]]=[cells[j],cells[i]];
      }
      for(const cell of cells){
        if(!state.running) break;
        drawInstructionSheet(state.curSheet);
        const x = padding + (cell.col-1)*cellSize;
        const y = padding + (cell.r-1)*cellSize;
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'black';
        ctx.strokeRect(x+1, y+1, cellSize-2, cellSize-2);
        await new Promise(r=>setTimeout(r,5));
      }
    }
    drawInstructionSheet(0);
  })();

  await Promise.all([stepper, scanner]);
}

  // computeSheetStats returns raw counts and propKnownEvidence only.
  function computeSheetStats(run, sheetIdx) {
    const TOTAL_BOXES = SCHEDULE.total;
    let revealedCells = [];
    if (sheetIdx > 0) {
      for (let g = 0; g <= sheetIdx - 1; g++) {
        revealedCells = revealedCells.concat(run.groups[g]);
      }
    }
    let totalBlue = 0;
    let totalRed = 0;
    for (const cell of revealedCells) {
      const key = `${cell.r}-${cell.c}`;
      const color = run.assignment[key];
      if (color === 'blue') totalBlue++;
      else if (color === 'red') totalRed++;
    }
    const totalKnownCurrent = totalBlue + totalRed;
    let newCells = [];
    if (sheetIdx > 0) {
      newCells = run.groups[sheetIdx - 1] || [];
    }
    let newBlue = 0;
    let newRed = 0;
    for (const cell of newCells) {
      const key = `${cell.r}-${cell.c}`;
      const color = run.assignment[key];
      if (color === 'blue') newBlue++;
      else if (color === 'red') newRed++;
    }
    const prevBlue = totalBlue - newBlue;
    const prevRed = totalRed - newRed;
    const totalRevealed = revealedCells.length;
    const totalClosed = TOTAL_BOXES - totalRevealed;
    const propKnownEvidence = totalKnownCurrent / TOTAL_BOXES;

    return {
      totalClosed,
      totalBlue,
      totalRed,
      prevBlue,
      prevRed,
      newBlue,
      newRed,
      totalKnownCurrent,
      propKnownEvidence
    };
  }

  // crossing moment: whether this sheet causes a majority change compared to previous sheet
  // Exclude transition Sheet1->Sheet2 and exclude ties (either prev or cur equal)
  function computeCrossingMoment(run, sheetIdx) {
    // sheetIdx is zero-based (0..8). We exclude sheetIdx <= 1 (i.e., transitions to sheet 1 and 2).
    if (!run || !Array.isArray(run.sheetTotals)) return 0;
    if (sheetIdx <= 1) return 0; // exclude Sheet1->Sheet2 (sheetIdx==1) and earlier
    const prevIdx = sheetIdx - 1;
    const prev = run.sheetTotals[prevIdx];
    const cur = run.sheetTotals[sheetIdx];
    if (!prev || !cur) return 0;
    if (prev.totalBlue === prev.totalRed) return 0;
    if (cur.totalBlue === cur.totalRed) return 0;
    const prevMajor = (prev.totalBlue > prev.totalRed) ? 'blue' : 'red';
    const curMajor = (cur.totalBlue > cur.totalRed) ? 'blue' : 'red';
    return (prevMajor !== curMajor) ? 1 : 0;
  }

  // After a participant makes a choice, compute all choice-relative proportions and rational metrics.
  function computeChoiceRelativePropsAndRational(resp, chosenColor, prevPredictedColor) {
    const denom = resp.totalKnownCurrent || 0;
    resp.prop_old_chosen = null;
    resp.prop_old_nonchosen = null;
    resp.prop_new_chosen = null;
    resp.prop_new_nonchosen = null;
    resp.prop_old_notlastchosen = null;
    resp.prop_new_notlastchosen = null;
    resp.rational_decision = null;
    resp.rational_change_of_mind = null;

    if (denom > 0) {
      const selIsBlue = (chosenColor === 'blue');
      const prev_selected_count = selIsBlue ? resp.prevBlue : resp.prevRed;
      const prev_nonselected_count = selIsBlue ? resp.prevRed : resp.prevBlue;
      const new_selected_count = selIsBlue ? resp.newBlue : resp.newRed;
      const new_nonselected_count = selIsBlue ? resp.newRed : resp.newBlue;

      resp.prop_old_chosen = prev_selected_count / denom;
      resp.prop_old_nonchosen = prev_nonselected_count / denom;
      resp.prop_new_chosen = new_selected_count / denom;
      resp.prop_new_nonchosen = new_nonselected_count / denom;

      const sum4 = resp.prop_old_chosen + resp.prop_old_nonchosen + resp.prop_new_chosen + resp.prop_new_nonchosen;
      if (sum4 > 0) {
        resp.prop_old_chosen /= sum4;
        resp.prop_old_nonchosen /= sum4;
        resp.prop_new_chosen /= sum4;
        resp.prop_new_nonchosen /= sum4;
      }
    }

    if (denom > 0 && prevPredictedColor) {
      const notLastIsBlue = (prevPredictedColor === 'red');
      const prev_notlast_count = notLastIsBlue ? resp.prevBlue : resp.prevRed;
      const new_notlast_count = notLastIsBlue ? resp.newBlue : resp.newRed;
      resp.prop_old_notlastchosen = prev_notlast_count / denom;
      resp.prop_new_notlastchosen = new_notlast_count / denom;
    }

    // rational_decision: does the participant's choice map to the color with more total balls at current sheet?
    if (denom > 0) {
      if (resp.totalBlue === resp.totalRed) {
        resp.rational_decision = null;
      } else {
        const majorityColor = (resp.totalBlue > resp.totalRed) ? 'blue' : 'red';
        resp.rational_decision = (chosenColor === majorityColor) ? 1 : 0;
      }
    } else {
      resp.rational_decision = null;
    }

    // rational_change_of_mind: only meaningful when change_of_mind === 1
    if (resp.change_of_mind === 1) {
      if (denom === 0 || resp.totalBlue === resp.totalRed) {
        resp.rational_change_of_mind = null;
      } else {
        const majorityColor = (resp.totalBlue > resp.totalRed) ? 'blue' : 'red';
        resp.rational_change_of_mind = (chosenColor === majorityColor) ? 1 : 0;
      }
    } else {
      resp.rational_change_of_mind = null;
    }
  }

  /* ===== Confidence-trajectory capture (v1-8) ================================
   Records the cup marker's path during every confidence rating: threshold-
   decimated (kept when the value changed AND >=10ms since the last kept
   sample; the final value is always appended at release), serialised as
   "t:v;t:v;..." with t = ms since the rating screen appeared and v = the
   0-256 cup value. Per-rating hesitancy metrics are computed at release.
   Capacity-capped (thin-by-half beyond 2000 samples). Consumes no random
   draws and touches no response mechanics. */
let __cupTraj = null, __cupTrajT0 = 0, __cupTrajLast = null, __cupTrajLastT = 0;
function __cupTrajBegin(v){
  __cupTrajT0 = performance.now();
  __cupTraj = [[0, v]];
  __cupTrajLast = v;
  __cupTrajLastT = 0;
}
function __cupTrajRecord(v){
  if (!__cupTraj) return;
  if (v === __cupTrajLast) return;
  const t = Math.max(0, Math.round(performance.now() - __cupTrajT0));
  if (t - __cupTrajLastT < 10) return;
  __cupTraj.push([t, v]);
  __cupTrajLast = v; __cupTrajLastT = t;
  if (__cupTraj.length > 2000){
    const kept = [__cupTraj[0]];
    for (let i=2; i<__cupTraj.length; i+=2) kept.push(__cupTraj[i]);
    __cupTraj = kept;
    __cupTrajLast = kept[kept.length-1][1];
    __cupTrajLastT = kept[kept.length-1][0];
  }
}
function __cupTrajFinalize(finalValue){
  if (!__cupTraj) return null;
  const tNow = Math.max(0, Math.round(performance.now() - __cupTrajT0));
  if (finalValue !== __cupTrajLast) __cupTraj.push([tNow, finalValue]);
  const T = __cupTraj; __cupTraj = null;
  let reversals=0, path=0, lastDir=0, firstMoveT=null, longestPause=0, maxV=T[0][1];
  for (let i=1; i<T.length; i++){
    const dv = T[i][1]-T[i-1][1], dt = T[i][0]-T[i-1][0];
    path += Math.abs(dv);
    if (dv !== 0){
      const dir = dv > 0 ? 1 : -1;
      if (lastDir !== 0 && dir !== lastDir) reversals++;
      lastDir = dir;
      if (firstMoveT === null) firstMoveT = T[i][0];
    }
    if (dt > longestPause) longestPause = dt;
    if (T[i][1] > maxV) maxV = T[i][1];
  }
  const finalDwell = tNow - T[T.length-1][0];
  if (finalDwell > longestPause) longestPause = finalDwell;
  const net = Math.abs(T[T.length-1][1] - T[0][1]);
  return {
    confidence_trajectory: T.map(p => p[0] + ':' + p[1]).join(';'),
    conf_traj_reversals: reversals,
    conf_traj_path_length: path,
    conf_traj_net_gross_ratio: path > 0 ? Math.round((net/path)*1000)/1000 : null,
    conf_traj_time_to_first_move: (firstMoveT === null) ? null : firstMoveT,
    conf_traj_longest_pause: longestPause,
    conf_traj_final_dwell: finalDwell,
    conf_traj_max_value: maxV
  };
}

function setCupValue(val){
    val = Math.max(INTERNAL_MIN, Math.min(INTERNAL_MAX, Math.round(val)));
    const y = valueToY(val);
    const height = CUP_BOTTOM - y;
    liquidRect.setAttribute('y', y);
    liquidRect.setAttribute('height', height);
    handle.setAttribute('cy', y);
    cupState.currentValue = val;
    __cupTrajRecord(val);
  }
  const cupState = { currentValue:0, dragging:false, hasMoved:false, initialX:0, initialY:0, dragOffsetY:0, lastSubmitX:null, lastSubmitY:null };
  setCupValue(cupState.currentValue);

  function svgPoint(evt){
    const pt = cupSVG.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    const ctm = cupSVG.getScreenCTM().inverse();
    return pt.matrixTransform(ctm);
  }

  function pointerDown(evt){
    evt.preventDefault();
    evt.stopPropagation();

    cupState.dragging = true;
    cupState.hasMoved = false;
    cupState.initialX = evt.clientX;
    cupState.initialY = evt.clientY;

    const p = svgPoint(evt);
    cupState.dragOffsetY = p.y - valueToY(cupState.currentValue);

    if (handle.setPointerCapture && evt.pointerId !== undefined) {
      try { handle.setPointerCapture(evt.pointerId); } catch(e) {}
    }

    document.addEventListener('pointermove', pointerMove);
    document.addEventListener('pointerup', pointerUp);
  }
  function pointerMove(evt){
    if (!cupState.dragging) return;
    evt.preventDefault();

    // The marker must actually be dragged before release can submit a rating.
    if (!cupState.hasMoved) {
      const dx = Math.abs(evt.clientX - cupState.initialX);
      const dy = Math.abs(evt.clientY - cupState.initialY);
      if (dx >= 1 || dy >= 1) {
        cupState.hasMoved = true;
      }
    }

    const p = svgPoint(evt);
    let y = Math.max(CUP_TOP, Math.min(CUP_BOTTOM, p.y - cupState.dragOffsetY));
    const frac = (CUP_BOTTOM - y) / CUP_HEIGHT;
    const val = Math.round(INTERNAL_MIN + frac * (INTERNAL_MAX - INTERNAL_MIN));
    setCupValue(val);
  }
  function pointerUp(evt){
    if (!cupState.dragging) return;
    evt.preventDefault();

    cupState.dragging = false;
    document.removeEventListener('pointermove', pointerMove);
    document.removeEventListener('pointerup', pointerUp);

    if (handle.releasePointerCapture && evt.pointerId !== undefined) {
      try { handle.releasePointerCapture(evt.pointerId); } catch(e) {}
    }

    // Do not submit from a simple click. The participant must drag the marker.
    if (cupState.hasMoved) {
      cupState.lastSubmitX = evt.clientX;
      cupState.lastSubmitY = evt.clientY;
      submitConfidenceByRelease();
    }
  }
  handle.addEventListener('pointerdown', pointerDown);

function generateBalancedDemoRun(){

  const rnd = mulberry32(999);

  const assignment = {};

  const cells = [];

  for(let r=1;r<=16;r++){
    for(let c=1;c<=16;c++){
      cells.push({r,c});
    }
  }

  // Shuffle spatial positions only
  for(let i=cells.length-1;i>0;i--){
    const j = Math.floor(rnd()*(i+1));
    [cells[i],cells[j]]=[cells[j],cells[i]];
  }

  // Desired NEW blue counts for sheets 2→9
  const bluePerGroup = [
    16, // Sheet 2
    12, // Sheet 3
    20, // Sheet 4
    16, // Sheet 5
    16, // Sheet 6
    20, // Sheet 7
    12, // Sheet 8
    16  // Sheet 9
  ];

  const groups = [];

  for(let g=0; g<8; g++){

    const groupCells = cells.slice(g*32,(g+1)*32);

    groups.push(groupCells);

    // Shuffle within group before assigning colors
    const shuffled = [...groupCells];

    for(let i=shuffled.length-1;i>0;i--){
      const j = Math.floor(rnd()*(i+1));
      [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }

    const nBlue = bluePerGroup[g];

    for(let i=0;i<shuffled.length;i++){

      const cell = shuffled[i];

      const key = `${cell.r}-${cell.c}`;

      assignment[key] =
        (i < nBlue)
        ? 'blue'
        : 'red';
    }
  }

  return {
    assignment,
    groups
  };
}

  function formatCsvCell(col, val) {
    if (val === null || typeof val === 'undefined' || val === '') return '';
    if (val === 'practice') return 'practice';
    if (numericColumns.has(col)) {
      if (typeof val === 'number' && isFinite(val)) return String(val);
      if (typeof val === 'boolean') return val ? '1' : '0';
      const num = Number(String(val).trim());
      if (!Number.isNaN(num) && isFinite(num)) return String(num);
      return '';

  function csvNumberOrNull(val){
    if (val === null || typeof val === 'undefined' || val === '') return null;
    const num = Number(val);
    return Number.isFinite(num) ? num : null;
  }

  function pearsonCorrelationFromPairs(pairs){
    if (!pairs || pairs.length < 2) return null;

    const n = pairs.length;
    let sumX = 0;
    let sumY = 0;

    for (const pair of pairs){
      sumX += pair.x;
      sumY += pair.y;
    }

    const meanX = sumX / n;
    const meanY = sumY / n;

    let ssX = 0;
    let ssY = 0;
    let ssXY = 0;

    for (const pair of pairs){
      const dx = pair.x - meanX;
      const dy = pair.y - meanY;
      ssX += dx * dx;
      ssY += dy * dy;
      ssXY += dx * dy;
    }

    if (ssX <= 0 || ssY <= 0) return null;

    return ssXY / Math.sqrt(ssX * ssY);
  }

  function addDerivedCsvFields(rows, options){
    options = options || {};

    const includeTrialCalibration = options.includeTrialCalibration !== false;
    const includeFeedbackHistory = options.includeFeedbackHistory === true;
    const includeSwitchFields = options.includeSwitchFields === true;
    const includeFeedbackSurprise = options.includeFeedbackSurprise === true;
    const includeSearchCommitFields = options.includeSearchCommitFields === true;

    // Row-level selected/nonselected evidence totals and stimulus-evidence margins.
    for (const row of rows){
      const propOldSelected = csvNumberOrNull(row.prop_old_chosen);
      const propNewSelected = csvNumberOrNull(row.prop_new_chosen);
      const propOldNonselected = csvNumberOrNull(row.prop_old_nonchosen);
      const propNewNonselected = csvNumberOrNull(row.prop_new_nonchosen);

      row.prop_chosen =
        (propOldSelected !== null && propNewSelected !== null)
          ? propOldSelected + propNewSelected
          : '';

      row.prop_nonchosen =
        (propOldNonselected !== null && propNewNonselected !== null)
          ? propOldNonselected + propNewNonselected
          : '';

      const totalBlue = csvNumberOrNull(row.totalBlue);
      const totalRed = csvNumberOrNull(row.totalRed);
      const totalKnown = csvNumberOrNull(row.totalKnownCurrent);

      if (totalBlue !== null && totalRed !== null && totalKnown !== null && totalKnown > 0){
        row.known_margin_signed_blue = (totalBlue - totalRed) / totalKnown;
        row.known_margin_signed_red = (totalRed - totalBlue) / totalKnown;
        row.known_margin_abs = Math.abs(totalBlue - totalRed) / totalKnown;
      } else {
        row.known_margin_signed_blue = '';
        row.known_margin_signed_red = '';
        row.known_margin_abs = '';
      }

      const choice = row.choice;
      const selected = row.selected_color;
      const finalTotalBlue = csvNumberOrNull(row.finalTotalBlue);
      const finalTotalRed = csvNumberOrNull(row.finalTotalRed);
      const finalTotal =
        (finalTotalBlue !== null && finalTotalRed !== null)
          ? finalTotalBlue + finalTotalRed
          : null;

      if ((choice === 'blue' || choice === 'red') && finalTotal !== null && finalTotal > 0){
        row.choice_probability_correct =
          (choice === 'blue')
            ? finalTotalBlue / finalTotal
            : finalTotalRed / finalTotal;
      } else {
        row.choice_probability_correct = '';
      }

      if ((choice === 'blue' || choice === 'red') && (selected === 'blue' || selected === 'red')){
        row.choice_matches_selected_color = (choice === selected) ? 1 : 0;
      } else {
        row.choice_matches_selected_color = '';
      }

      const confidence = csvNumberOrNull(row.confidence);
      const prevConfidence = csvNumberOrNull(row.prevConfidence);
      row.confidence_change =
        (confidence !== null && prevConfidence !== null)
          ? confidence - prevConfidence
          : '';
    }

    const blockPairsBySubject = {};
    const trialPairsBySubjectTrial = {};

    for (const row of rows){
      const sheet = csvNumberOrNull(row.sheet);
      const propSelected = csvNumberOrNull(row.prop_chosen);
      const confidence = csvNumberOrNull(row.confidence);

      if (sheet === null || sheet < 2 || sheet > 9) continue;
      if (propSelected === null || confidence === null) continue;

      const subjectKey = String(row.subject);
      const trialKey = subjectKey + '|' + String(row.trialIndex);

      // v1-10: the block-level calibration excludes the practice grid
      // (the practice grid's trial-level calibration is still computed).
      if (String(row.trialIndex) !== 'practice'){
        if (!blockPairsBySubject[subjectKey]) blockPairsBySubject[subjectKey] = [];
        blockPairsBySubject[subjectKey].push({ x: propSelected, y: confidence });
      }

      if (includeTrialCalibration){
        if (!trialPairsBySubjectTrial[trialKey]) trialPairsBySubjectTrial[trialKey] = [];
        trialPairsBySubjectTrial[trialKey].push({ x: propSelected, y: confidence });
      }
    }

    const blockCorrBySubject = {};
    for (const subjectKey in blockPairsBySubject){
      const r = pearsonCorrelationFromPairs(blockPairsBySubject[subjectKey]);
      blockCorrBySubject[subjectKey] = (r === null) ? '' : r;
    }

    const trialCorrBySubjectTrial = {};
    if (includeTrialCalibration){
      for (const trialKey in trialPairsBySubjectTrial){

            : '';

    if (includeSwitchFields || includeSearchCommitFields){
      const rowsBySubjectTrial = {};

      for (const row of rows){
        const trialIndex = csvNumberOrNull(row.trialIndex);
        if (trialIndex === null) continue;

        // Include the task so combined-stream files never pool phase-1 and phase-2
        // rows that share a trial number.
        const key = String(row.subject) + '|' + String(row.task_name || '') + '|' + String(trialIndex);
        if (!rowsBySubjectTrial[key]) rowsBySubjectTrial[key] = [];

          .slice()

            const sheetB = csvNumberOrNull(b.sheet);

    if (Array.isArray(tr.responses) && tr.responses.length > 0){
      const responses = tr.responses.filter(Boolean);
      const first = responses[0];
      const lastWithConfidence = responses
        .slice()
        .reverse()
        .find(r => r && r.confidence !== null && typeof r.confidence !== 'undefined');

      const start = first && typeof first.predictOnset === 'number'
        ? first.predictOnset

      let end = null;

        if (typeof lastWithConfidence.confOnset === 'number' && typeof lastWithConfidence.confRT === 'number'){
          end = lastWithConfidence.confOnset + lastWithConfidence.confRT;
        } else if (typeof lastWithConfidence.confRT === 'number'){
          end = lastWithConfidence.confRT;
        }
      }

      if (start !== null && end !== null && end >= start){
        return end - start;

    }

    if (Array.isArray(tr.sheetRows) && tr.sheetRows.length > 0){
      const sheetRows = tr.sheetRows.filter(Boolean);
      const first = sheetRows[0];
      const lastWithConfidence = sheetRows
        .slice()

        : null;

      let end = null;

      } else if (typeof tr.trialEnd === 'number'){
        end = tr.trialEnd;
      }

      if (start !== null && end !== null && end >= start){
        return end - start;
      }
    }

    if (typeof tr.trialStartTime === 'number' && typeof tr.trialEnd === 'number'){

            for (var __C=1; __C<=GRID_COLS; __C++){
              var __key = __R+'-'+__C;
              var __val = __m[__key];
              var __fval = __fm[__key];
              __chars.push(__val === 'blue' ? 'B' : (__val === 'red' ? 'R' : 'X'));
              __finalChars.push(__fval === 'blue' ? 'B' : (__fval === 'red' ? 'R' : 'X'));
            }
          }
          row.grid_display = __chars.join('');
          row.final_grid_display = __finalChars.join('');
        }
        rows.push(row);
      }
    }
    addDerivedCsvFields(rows, { includeTrialCalibration: true, includeFeedbackHistory: false, includeSwitchFields: true });
    /* v1-38: overall_maintask_matches = total matches across the 32 real trials */
    (function(){
      var __tot = 0;
      for (var __i=0; __i<rows.length; __i++){
        var __r = rows[__i];
        if (__r.trialIndex === 'practice') continue;
        var __m = __r.choice_matches_selected_color;
        if (__m === 1 || __m === '1' || __m === 0 || __m === '0'){ __tot += Number(__m); }
      }
      for (var __j=0; __j<rows.length; __j++){ rows[__j].overall_maintask_matches = __tot; }
    })();
    return rows;
  }

  // ===== POST-TRIAL manipulation check (added) =====
  // Mirrors the pre-trial check but in the PAST tense, options in randomised
  // order, with a 3000ms answer delay. No re-routing on failure: the answer is
  // recorded into window.__postManipLog and we proceed to the end screen.
  window.__postManipLog = window.__postManipLog || { answer:'', correct:'', rt:'', layout1:'', layout2:'' };
  function runPostManipCheck(done){
    var CORRECT_ID = 'single_full';
    var QUESTION = 'THIS IS IMPORTANT: Now that you have finished, please confirm what your goal was in this task.';
    var OPTIONS = [
      { id:'single_open',    text:'Guess the colour of the SINGLE BALL that the computer selected from the OPEN BOXES only.' },
      { id:'single_full',      text:'Guess the colour of the SINGLE BALL that the computer selected from the FULL GRID.' },
      { id:'more_open', text:'Guess which colour makes up MORE BALLS in the OPEN BOXES only.' },
      { id:'more_full',   text:'Guess which colour makes up MORE BALLS in the FULL GRID.' }
    ];

    var area = document.getElementById('manipCheckArea');
    var inner = document.getElementById('manipCheckInner');
    window.__postManipLog = { answer1:'', correct1:'', rt1:'', answer2:'', correct2:'', rt2:'', attempts:0, passed:'' };
    if (!area || !inner){ if (typeof done==='function') done(); return; }

    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function shuffle(a){ a=a.slice(); for (var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
    function hideStages(){
      ['manipCheckArea','instructions','instructionFlow','taskArea','endArea'].forEach(function(id){
        var el = document.getElementById(id); if (el) el.style.display='none';
      });
    }

    function ask(attempt){
      var DELAY = (attempt === 1) ? 10000 : 3000;
      var answered = false, answersReady = false, enableTime = null;
      hideStages(); area.style.display = 'block';
      var order = __goalOrderOnce(OPTIONS);
      var __layoutCode = __goalLayoutCode(order);
      var letters = ['a','b','c','d'];
      var optsHtml = order.map(function(o,idx){
        var L = letters[idx] || String(idx+1);
        return '<button type="button" class="manipOpt manipPostOpt" data-id="'+o.id+'">'
             +   '<span class="manipKey">'+L+')</span> <span class="manipText">'+esc(o.text)+'</span>'
             + '</button>';
      }).join('');
      inner.innerHTML =
        '<div class="manipWrap">'
      +   '<div class="manipQ">'+esc(QUESTION)+'</div>'
      +   '<div class="manipWait" style="font-size:18px;color:#b00020;font-weight:600;min-height:22px;"></div>'
      +   '<div class="manipOpts">'+optsHtml+'</div>'
      + '</div>';
      var btns = inner.querySelectorAll('.manipPostOpt');
      function setLocked(locked){
        for (var i=0;i<btns.length;i++){
          btns[i].style.opacity = locked ? '0.45' : '';
          btns[i].style.pointerEvents = locked ? 'none' : '';
          btns[i].style.cursor = locked ? 'not-allowed' : '';
        }
        document.body.style.cursor = locked ? 'not-allowed' : '';
      }
      var hint = inner.querySelector('.manipWait');
      var remaining = Math.ceil(DELAY/1000);
      function paint(){ if (hint) hint.textContent = 'Please read all options carefully. You can answer in ' + remaining + '…'; }
      setLocked(true); paint();
      var cd = setInterval(function(){ remaining -= 1; if (remaining>0){ paint(); } else { clearInterval(cd); } }, 1000);
      setTimeout(function(){
        answersReady = true; enableTime = performance.now(); clearInterval(cd);
        setLocked(false); if (hint) hint.textContent = 'You can answer now.';
      }, DELAY);

      function onPick(id){
        if (answered || !answersReady) return;
        answered = true;
        var rt = (enableTime !== null) ? Math.round(performance.now() - enableTime) : '';
        var correct = (id === CORRECT_ID) ? 1 : 0;
        window.__postManipLog.attempts = attempt;
        if (attempt === 1){ window.__postManipLog.answer1 = id; window.__postManipLog.correct1 = correct; window.__postManipLog.rt1 = rt; window.__postManipLog.layout1 = __layoutCode; }
        else { window.__postManipLog.answer2 = id; window.__postManipLog.correct2 = correct; window.__postManipLog.rt2 = rt; window.__postManipLog.layout2 = __layoutCode; }
        if (correct){
          window.__postManipLog.passed = 1;
          area.style.display = 'none';
          if (typeof done === 'function') done();
        } else if (attempt === 1){
          showRetry();
        } else {
          window.__postManipLog.passed = 0;
          area.style.display = 'none';
          if (typeof done === 'function') done();
        }
      }
      for (var b=0;b<btns.length;b++){
        (function(btn){
          btn.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); onPick(btn.getAttribute('data-id')); });
        })(btns[b]);
      }
    }

    function showRetry(){
      hideStages(); area.style.display = 'block';
      inner.innerHTML =
        '<div class="manipWrap">'
      +   '<div class="manipCorrection">'
      +     '<div class="manipCorrTitle" style="font-size:24px;font-weight:700;color:#b00020;">That was incorrect.</div>'
      +     '<div class="manipCorrBody" style="font-size:18px;max-width:600px;line-height:1.4;">You will be given <strong>one more chance</strong> to answer this question correctly.</div>'
      +     '<div class="manipWait2" style="font-size:18px;color:#b00020;font-weight:600;min-height:22px;"></div>'
      +   '</div>'
      + '</div>';
      var ready = false; document.body.style.cursor='not-allowed';
      var remaining = 2;
      var hint = inner.querySelector('.manipWait2');
      function paint(){ if (hint) hint.textContent = 'Please wait ' + remaining + '…'; }
      paint();
      var cd = setInterval(function(){ remaining -= 1; if (remaining>0){ paint(); } else { clearInterval(cd); } }, 1000);
      setTimeout(function(){ ready = true; document.body.style.cursor=''; clearInterval(cd); if (hint){ hint.style.color=''; hint.textContent = 'Click anywhere to try again.'; } }, 2000);
      function go(ev){ ev.preventDefault(); ev.stopImmediatePropagation(); if (!ready) return; document.removeEventListener('click', go, true); ask(2); }
      document.addEventListener('click', go, true);
    }

    ask(1);
  }

  function __pad2(n){ return String(n).padStart(2, '0'); }

    return SURVEYS

      .sort(function(a, b){ return (a.s.order - b.s.order) || (a.idx - b.idx); })

<script>
/* ============================================================
   NO-SCROLL MULTI-SCREEN AUTO-FIT  (added for Prolific launch)
   ------------------------------------------------------------
   Runs AFTER the experiment's own script. Wraps each fittable
   screen's content in a single .nf-fit element and scales that
   element down so the whole screen fits the viewport with no
   scrolling. Never upscales (no blur, large screens unchanged).
   Self-discovering: only acts on screens that exist in this file.
   ============================================================ */
(function(){
  'use strict';

  /* Screens that must fully fit (instructions + task stimuli).
     #endArea (final data screen) is intentionally NOT in this list:
     it is allowed to scroll internally. */
  var FIT_IDS = ['manipCheckArea', 'instructions', 'instructionFlow', 'taskArea'];
  var ALL_IDS = ['manipCheckArea', 'instructions', 'instructionFlow', 'taskArea', 'endArea'];

  /* Exactly one screen should own the viewport. Some files (e.g. the feedback
     task) leave an EMPTY instruction panel displayed underneath the task; we
     pick a single primary by this priority and collapse any other leftover. */
  var PRIORITY = ['manipCheckArea', 'endArea', 'taskArea', 'instructionFlow', 'instructions'];

  function byId(id){ return document.getElementById(id); }

  function isVisible(el){
    if (!el) return false;
    var cs = getComputedStyle(el);
    if (cs.display === 'none' || cs.visibility === 'hidden') return false;
    if (el.offsetParent === null) {
      var r = el.getClientRects();
      if (!r || r.length === 0) return false;
    }
    return true;
  }

  /* The experiment toggles screens via inline style.display. We read THAT
     intent (not computed style) so our own collapse class never pollutes the
     decision and can't cause a show/hide feedback loop. An inline
     display:none means the experiment hid it; anything else means shown.
     (No stage in these files is base-CSS-hidden without an inline override.) */
  function intendedVisible(el){
    return !!el && !(el.style && el.style.display === 'none');
  }

  /* Move all of a screen's children into a single .nf-fit wrapper (once).
     IDs are preserved, so every reference the experiment script already
     holds stays valid and all descendant CSS selectors keep matching. */
  function ensureWrapped(el){
    if (!el) return null;
    if (el.__nfFit) return el.__nfFit;
    var fit = document.createElement('div');
    fit.className = 'nf-fit';
    while (el.firstChild) fit.appendChild(el.firstChild);
    el.appendChild(fit);
    el.__nfFit = fit;
    return fit;
  }

  function setup(){
    ALL_IDS.forEach(function(id){
      var el = byId(id);
      if (el) el.classList.add('nf-stage');
    });
    FIT_IDS.forEach(function(id){
      var el = byId(id);
      if (el) ensureWrapped(el);
    });
  }

  function fitStage(el){
    if (!el) return;
    var fit = el.__nfFit;
    if (!fit) return;
    /* Measure natural (unscaled) size. scrollWidth/Height are unaffected by
       any transform, so this never feeds back on itself. */
    fit.style.transform = 'none';
    var availW = el.clientWidth;
    var availH = el.clientHeight;
    if (availW <= 0 || availH <= 0) return;
    var natW = fit.scrollWidth;
    var natH = fit.scrollHeight;
    if (natW <= 0 || natH <= 0) return;
    var s = Math.min(availW / natW, availH / natH, 1);
    if (s < 1) s *= 0.985;            /* small margin for sub-pixel rounding */
    if (s >= 0.999) {
      fit.style.transform = 'none';
    } else {
      fit.style.transform = 'scale(' + s.toFixed(4) + ')';
    }
  }

  function updateActiveAndFit(){
    /* Choose the single primary screen among those the experiment intends
       to show, by priority. */
    var primary = null;
    for (var i = 0; i < PRIORITY.length; i++){
      var pe = byId(PRIORITY[i]);
      if (pe && intendedVisible(pe)) { primary = PRIORITY[i]; break; }
    }
    ALL_IDS.forEach(function(id){
      var el = byId(id);
      if (!el) return;
      if (id === primary){
        el.classList.add('nf-active');
        el.classList.remove('nf-collapsed');
      } else if (intendedVisible(el)){
        /* visible but not primary => an empty leftover panel: hide it so it
           doesn't take a slice of the column above the task */
        el.classList.remove('nf-active');
        el.classList.add('nf-collapsed');
      } else {
        el.classList.remove('nf-active');
        el.classList.remove('nf-collapsed');
      }
    });
    /* Only instruction/task screens are scaled; #endArea may scroll instead. */
    if (primary && FIT_IDS.indexOf(primary) !== -1){
      fitStage(byId(primary));
    }
  }

  var rafPending = false;
  function scheduleFit(){
    if (rafPending) return;
    rafPending = true;
    (window.requestAnimationFrame || function(f){ return setTimeout(f, 16); })(function(){
      rafPending = false;
      updateActiveAndFit();
    });
  }

  function init(){
    setup();
    updateActiveAndFit();

    window.addEventListener('resize', scheduleFit, { passive: true });
    window.addEventListener('orientationchange', scheduleFit, { passive: true });
    window.addEventListener('load', scheduleFit);

    if (document.fonts && document.fonts.ready && document.fonts.ready.then) {
      document.fonts.ready.then(scheduleFit).catch(function(){});
    }

    if (typeof ResizeObserver !== 'undefined') {
      var ro = new ResizeObserver(scheduleFit);
      ALL_IDS.forEach(function(id){
        var el = byId(id);
        if (el) {
          ro.observe(el);
          if (el.__nfFit) ro.observe(el.__nfFit);
        }
      });
    }

    if (typeof MutationObserver !== 'undefined') {
      var mo = new MutationObserver(scheduleFit);
      ALL_IDS.forEach(function(id){
        var el = byId(id);
        if (!el) return;
        /* screen show/hide (inline style or class changes) */
        mo.observe(el, { attributes: true, attributeFilter: ['style', 'class'] });
        /* instruction innerHTML swaps and slide show/hide */
        if (el.__nfFit) {
          mo.observe(el.__nfFit, {
            childList: true, subtree: true,
            attributes: true, attributeFilter: ['style', 'class']
          });
        }
      });
    }

    /* Re-fit once any in-content image finishes loading. */
    var imgs = document.querySelectorAll('.nf-fit img');
    Array.prototype.forEach.call(imgs, function(img){
      if (!img.complete) img.addEventListener('load', scheduleFit, { once: true });
    });

    /* Catch-all retries for late async layout. */
    [0, 60, 160, 320, 650, 1200, 2000].forEach(function(t){ setTimeout(scheduleFit, t); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

/* The final data/results screen may scroll internally if it is long. */
#endArea.nf-active{
  overflow:auto !important;
  justify-content:flex-start !important;
}

/* A screen the experiment left displayed but that is not the active one
   (e.g. the now-empty instruction panel sitting under the task) is hidden so
   it never steals a slice of the viewport above the task stimuli. */
.nf-collapsed{
  display:none !important;
}

/* Wrapper injected around each fit-screen's content; this is what we scale. */
.nf-fit{
  flex:0 0 auto;
  width:100%;
  box-sizing:border-box;
  transform-origin:center center;
  will-change:transform;
}

/* ------------------------------------------------------------
   TASK-PHASE FIT
   The existing responsive task patch already shrinks the grid via
   viewport math. Combined with this layer's scaling that produced a
   double-shrink (tiny grid) and pushed the A/D keys off-screen.
   Fix: pin the task column to its natural desktop size and let the
   auto-fit layer be the SINGLE source of scaling - one uniform
   scale of the whole column (grid + prompt + A/D keys + message),
   anchored to the top so the grid sits directly under the heading
   and the A/D keys always stay on screen. Pure layout; the task
   drawing and interaction code is untouched.
   ------------------------------------------------------------ */
:root{
  --task-grid-size: min(520px, 94vw) !important;   /* fixed 520px grid, but never wider than the viewport so it always stays horizontally centred in small windows; the auto-fit still scales for height */
}
#taskArea.nf-active{
  max-height:none !important;           /* let the flex height own it, not a vh cap */
  margin-top:0 !important;
  justify-content:flex-start !important;
}
#taskArea > .nf-fit{
  display:flex !important;
  flex-direction:column !important;
  align-items:center !important;
  justify-content:flex-start !important;
  transform-origin:top center;          /* scale toward the top: nothing clips off the bottom */
}

/* ------------------------------------------------------------
   STABLE TRIAL HEIGHT
   The trial reveals the A/D keys (#controlsRow) ~150ms after the
   grid appears, and toggles the prompt between the prediction and
   confidence phases. Each toggle changed the column height and made
   the auto-fit re-scale, so the grid visibly shrank mid-trial.
   Fix: while these elements are hidden, RESERVE their space (keep the
   layout box, just make them invisible) instead of collapsing them.
   The column height is then constant for the whole trial, so the grid
   is sized once for the final (keys-visible) layout and never resizes.
   The keys remain invisible and non-interactive during the delay.
   ------------------------------------------------------------ */
#taskArea #controlsRow[style*="display: none"],
#taskArea #controlsRow[style*="display:none"]{
  display:flex !important;
  visibility:hidden !important;
}
#taskArea .prompt[style*="display: none"],
#taskArea .prompt[style*="display:none"]{
  display:block !important;
  visibility:hidden !important;
}


/* ============================================================
   MANIPULATION CHECK (added) - styles for the pre-trial goal
   comprehension check and its correction screen. Scaled to fit
   by the existing no-scroll auto-fit layer (manipCheckArea is a
   registered stage), so it never scrolls on any screen.
   ============================================================ */
#manipCheckArea{ width:100%; box-sizing:border-box; }
.manipWrap{
  width:100%; max-width:780px; margin:0 auto; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:22px; padding:10px;
}
.manipQ{ font-size:26px; font-weight:700; line-height:1.3; }
.manipOpts{ display:flex; flex-direction:column; gap:14px; width:100%; align-items:center; }
.manipOpt{
  display:flex; align-items:flex-start; gap:12px; text-align:left;
  width:100%; max-width:700px;
  font-size:20px; line-height:1.35; padding:16px 18px;
  border:2px solid #333; border-radius:10px; background:#fff; color:#111;
  cursor:pointer; font-family:inherit;
}
.manipOpt:hover{ background:#eef3ff; border-color:#2b6cff; }
.manipKey{ font-weight:800; }
.manipText{ flex:1; }
.manipCorrection{ display:flex; flex-direction:column; gap:14px; align-items:center; }
.manipCorrTitle{ font-size:26px; font-weight:800; color:#b00020; }
.manipCorrBody{ font-size:22px; line-height:1.35; }
.manipCorrAnswer{ font-size:22px; font-weight:700; max-width:700px; line-height:1.4; }
.manipContinue{
  font-size:22px; font-weight:700; padding:14px 34px; border:2px solid #111;
  border-radius:10px; background:#111; color:#fff; cursor:pointer; font-family:inherit;
}
.manipContinue:hover{ background:#333; }
.manipCorrect{ display:flex; flex-direction:column; gap:14px; align-items:center; }
.manipCorrectTitle{ font-size:28px; font-weight:800; color:#1a9c41; }
.manipCorrectBody{ font-size:23px; line-height:1.4; max-width:700px; }
.manipBegin{ font-size:22px; font-weight:700; padding:14px 34px; border:2px solid #111; border-radius:10px; background:#111; color:#fff; cursor:pointer; font-family:inherit; }

   The auto-fit layer above anchored #taskArea's column to the top so the
